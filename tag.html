<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag — NhàĐẹp.vn</title>
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --bg: #0A0A0A;
            --card: #111111;
            --mid: #1A1A1A;
            --border: rgba(198,164,59,.2);
            --gold: #C6A43B;
            --gold2: #D4AF37;
            --text: #F5F5F5;
            --muted: #9C9C9C;
            --dim: #6B6B6B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── NAV ── */
        nav {
            background: rgba(10,10,10,.95);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        nav h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
        nav h1 span { color: var(--gold); }
        nav a { color: var(--muted); text-decoration: none; font-size: .9rem; transition: color .2s; }
        nav a:hover { color: var(--gold); }

        /* ── HERO ── */
        .hero {
            padding: 56px 32px 36px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .hero-eyebrow {
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 12px;
        }
        .hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 900;
            line-height: 1.2;
        }
        .hero h2 .tag-name { color: var(--gold); }
        .hero-count {
            margin-top: 12px;
            color: var(--muted);
            font-size: .88rem;
        }
        .hero-divider {
            margin-top: 32px;
            border: none;
            border-top: 1px solid var(--border);
        }

        /* ── ALL TAGS BAR ── */
        .all-tags-bar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 32px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .all-tags-bar .bar-label {
            font-size: .75rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 4px;
        }
        .tag-pill {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: .75rem;
            text-decoration: none;
            background: var(--mid);
            color: var(--muted);
            border: 1px solid var(--border);
            transition: all .2s;
            cursor: pointer;
        }
        .tag-pill:hover { background: rgba(198,164,59,.15); color: var(--gold); border-color: var(--gold); }
        .tag-pill.active { background: rgba(198,164,59,.25); color: var(--gold2); border-color: var(--gold); font-weight: 600; }

        /* ── GRID ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 32px 80px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        /* ── CARD ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: row;
            align-items: stretch;
            transition: transform .25s, border-color .25s, box-shadow .25s;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(198,164,59,.5);
            box-shadow: 0 12px 40px rgba(0,0,0,.5);
        }
        .card-thumb-wrap {
            flex-shrink: 0;
            width: 160px;
        }
        .card-thumb {
            width: 160px;
            height: 100%;
            min-height: 140px;
            object-fit: cover;
            display: block;
        }
        .card-thumb-placeholder {
            width: 160px;
            height: 100%;
            min-height: 140px;
            background: linear-gradient(135deg, var(--mid), #222);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dim);
            font-size: 2rem;
        }
        .card-body {
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .card-tag {
            font-size: .68rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(198,164,59,.15);
            color: var(--gold2);
            text-decoration: none;
            transition: background .2s;
        }
        .card-tag:hover { background: rgba(198,164,59,.35); }
        .card-tag.active-tag {
            background: rgba(198,164,59,.3);
            color: #fff;
            font-weight: 600;
        }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .card-summary {
            font-size: .82rem;
            color: var(--muted);
            line-height: 1.6;
            flex: 1;
        }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .card-date { font-size: .75rem; color: var(--dim); }
        .card-arrow {
            font-size: .75rem;
            color: var(--gold);
        }

        /* ── EMPTY ── */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }
        .empty i { font-size: 3rem; color: var(--dim); margin-bottom: 20px; display: block; }

        /* ── LOADING ── */
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--dim);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            nav { padding: 12px 16px; }
            .hero { padding: 36px 16px 24px; }
            .hero h2 { font-size: 1.7rem; }
            .all-tags-bar { padding: 16px 16px 0; }
            .container { padding: 24px 16px 60px; }
            .grid { grid-template-columns: 1fr; gap: 16px; }
            .card { flex-direction: column; }
            .card-thumb-wrap { width: 100%; }
            .card-thumb, .card-thumb-placeholder { width: 100%; height: 180px; min-height: unset; }
        }
    </style>
</head>
<body>

<nav>
    <h1>
        <img src="./logo.webp" alt="Logo"
             style="height:32px;width:32px;object-fit:cover;border-radius:7px;vertical-align:middle;margin-right:7px;"
             onerror="this.style.display='none'">
        Nhà<span>Đẹp</span>
    </h1>
    <a href="./index.html">← Về trang chủ</a>
</nav>

<div class="hero">
    <div class="hero-eyebrow"><i class="fa-solid fa-tag"></i> Danh mục</div>
    <h2>Bài viết về <span class="tag-name" id="hero-tag-name">…</span></h2>
    <div class="hero-count" id="hero-count"></div>
    <hr class="hero-divider">
</div>

<div class="all-tags-bar" id="all-tags-bar">
    <span class="bar-label">Tất cả tag:</span>
    <!-- Sinh động bằng JS -->
</div>

<div class="container">
    <div class="grid" id="grid">
        <div class="loading"><div class="spinner"></div>Đang tải bài viết…</div>
    </div>
</div>

<script>
// ── Đọc query param ?tag=... ──────────────────────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const activeTag = (params.get('tag') || '').trim();

// Cập nhật <title> và hero ngay
document.title = activeTag ? `Tag: ${activeTag} — NhàĐẹp.vn` : 'Tags — NhàĐẹp.vn';
document.getElementById('hero-tag-name').textContent = activeTag || 'Tất cả';

// ── Helpers ───────────────────────────────────────────────────────────────────
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function buildArticleUrl(item) {
    // item.url đã là đường dẫn đầy đủ ví dụ: ./nhadep/ten-bai.html
    return item.url || '#';
}

function buildThumbUrl(item) {
    // Suy ra thumbnail từ url bài viết
    // ./nhadep/ten-bai.html  →  ./thumbnail/nhadep/ten-bai.webp
    const kind = item.kind || 'nhadep';
    const relLink = (item.relatedlink || '').replace('./', '').replace('.html', '');
    let slug = relLink;
    try { slug = decodeURIComponent(relLink); } catch(e) {}
    return `./thumbnail/${kind}/${encodeURIComponent(slug)}.webp`;
}

function getTags(item) {
    return (item.tag || '').split(',').map(t => t.trim()).filter(Boolean);
}

// ── Render card ───────────────────────────────────────────────────────────────
function renderCard(item) {
    const url      = buildArticleUrl(item);
    const thumbUrl = buildThumbUrl(item);
    const tags     = getTags(item);
    const title    = escapeHtml(item.title || '');
    const summary  = escapeHtml((item.summary || '').substring(0, 100));
    const date     = escapeHtml(item.date || '');

    const tagsHtml = tags.map(t => {
        const isActive = t === activeTag ? ' active-tag' : '';
        return `<a class="card-tag${isActive}" href="./tag.html?tag=${encodeURIComponent(t)}">${escapeHtml(t)}</a>`;
    }).join('');

    return `
    <a class="card" href="${escapeHtml(url)}">
        <div class="card-thumb-wrap">
            <img class="card-thumb" src="${escapeHtml(thumbUrl)}" alt="${title}"
                 loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="card-thumb-placeholder" style="display:none">
                <i class="fa-regular fa-image"></i>
            </div>
        </div>
        <div class="card-body">
            <div class="card-tags">${tagsHtml}</div>
            <div class="card-title">${title}</div>
            ${summary ? `<div class="card-summary">${summary}${item.summary && item.summary.length > 100 ? '…' : ''}</div>` : ''}
            <div class="card-footer">
                <span class="card-date">${date}</span>
                <span class="card-arrow">Đọc tiếp <i class="fa-solid fa-arrow-right"></i></span>
            </div>
        </div>
    </a>`;
}

// ── Render all-tags bar ───────────────────────────────────────────────────────
function renderTagsBar(allPosts) {
    const tagSet = new Set();
    allPosts.forEach(p => getTags(p).forEach(t => tagSet.add(t)));

    const bar = document.getElementById('all-tags-bar');
    const pills = [...tagSet].sort().map(t => {
        const isActive = t === activeTag ? ' active' : '';
        return `<a class="tag-pill${isActive}" href="./tag.html?tag=${encodeURIComponent(t)}">${escapeHtml(t)}</a>`;
    }).join('');
    bar.innerHTML = `<span class="bar-label"><i class="fa-solid fa-tags"></i> Tag:</span>${pills}`;
}

// ── Main: fetch data.json ─────────────────────────────────────────────────────
(async function () {
    const grid = document.getElementById('grid');
    try {
        const res   = await fetch('./data.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const posts = await res.json();

        // Render tag bar từ toàn bộ dữ liệu
        renderTagsBar(posts);

        // Lọc theo tag
        const filtered = activeTag
            ? posts.filter(p =>
                getTags(p).some(t => t.toLowerCase() === activeTag.toLowerCase())
              )
            : posts;

        // Cập nhật đếm
        document.getElementById('hero-count').textContent =
            filtered.length > 0
                ? `${filtered.length} bài viết`
                : 'Chưa có bài viết nào';

        // Render grid
        if (filtered.length === 0) {
            grid.innerHTML = `
                <div class="empty">
                    <i class="fa-regular fa-folder-open"></i>
                    <div>Không tìm thấy bài viết nào với tag <strong>"${escapeHtml(activeTag)}"</strong></div>
                </div>`;
        } else {
            grid.innerHTML = filtered.map(renderCard).join('');
        }

    } catch (err) {
        grid.innerHTML = `
            <div class="empty">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <div>Không thể tải dữ liệu.<br><small style="color:var(--dim)">${escapeHtml(err.message)}</small></div>
            </div>`;
        console.error('tag.html error:', err);
    }
})();
</script>
</body>
</html>
