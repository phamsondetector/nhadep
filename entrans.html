<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NhàĐẹp.vn - English Version</title>
    <meta name="robots" content="noindex, nofollow">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Open Sans', system-ui, sans-serif;
            background: #0A0A0A;
            color: #F5F5F5;
        }
        
        /* Toolbar cố định ở trên cùng */
        .translate-toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(198,164,59,0.2);
            padding: 8px 24px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            z-index: 10000;
        }
        
        .lang-buttons {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 4px;
        }
        
        .lang-btn {
            background: none;
            border: none;
            color: #9C9C9C;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 6px 20px;
            border-radius: 30px;
            transition: all 0.2s;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
        }
        
        .lang-btn.active {
            background: rgba(198,164,59,0.25);
            color: #C6A43B;
        }
        
        .lang-btn:hover {
            background: rgba(198,164,59,0.15);
            color: #C6A43B;
        }
        
        /* Khung iframe chứa nội dung */
        .iframe-container {
            position: fixed;
            top: 55px;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: calc(100% - 55px);
            background: #0A0A0A;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0A0A0A;
        }
        
        /* Ẩn hoàn toàn mọi thành phần của Google Translate */
        .goog-te-banner-frame,
        .goog-te-menu-frame,
        .goog-te-ftab-frame,
        .goog-te-gadget-simple,
        .goog-te-spinner-pos,
        .goog-te-balloon-frame,
        .skiptranslate,
        .goog-te-gadget,
        #google_translate_element,
        .goog-te-banner {
            display: none !important;
        }
        
        body {
            top: 0px !important;
            position: relative !important;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(198,164,59,0.2);
            border-top-color: #C6A43B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #C6A43B;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        
        @media (max-width: 768px) {
            .translate-toolbar {
                padding: 6px 16px;
            }
            .lang-btn {
                padding: 4px 16px;
                font-size: 0.7rem;
            }
            .iframe-container {
                top: 48px;
                height: calc(100% - 48px);
            }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading English version...</div>
</div>

<div class="translate-toolbar">
    <div class="lang-buttons" id="langButtons">
        <button class="lang-btn" id="btnVi" data-lang="vi">🇻🇳 VI</button>
        <button class="lang-btn active" id="btnEn" data-lang="en">🇬🇧 EN</button>
    </div>
</div>

<div class="iframe-container">
    <iframe id="contentFrame" src="about:blank"></iframe>
</div>

<script>
    let targetUrl = '';
    let translateAttempts = 0;
    const MAX_ATTEMPTS = 20;
    let isTranslating = false;
    
    // Hàm bảo vệ các nút khỏi bị Google Translate thay đổi
    function protectButtons() {
        const viBtn = document.getElementById('btnVi');
        const enBtn = document.getElementById('btnEn');
        
        if (viBtn && viBtn.innerHTML !== '🇻🇳 VI') {
            viBtn.innerHTML = '🇻🇳 VI';
        }
        if (enBtn && enBtn.innerHTML !== '🇬🇧 EN') {
            enBtn.innerHTML = '🇬🇧 EN';
        }
    }
    
    // Sử dụng MutationObserver để theo dõi và bảo vệ các nút
    function observeAndProtectButtons() {
        const targetNode = document.getElementById('langButtons');
        if (!targetNode) return;
        
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'childList' || mutation.type === 'characterData') {
                    protectButtons();
                }
            });
        });
        
        observer.observe(targetNode, {
            childList: true,
            subtree: true,
            characterData: true
        });
        
        // Cũng bảo vệ toàn bộ document
        const bodyObserver = new MutationObserver(function() {
            protectButtons();
        });
        
        bodyObserver.observe(document.body, {
            childList: true,
            subtree: true
        });
        
        protectButtons();
    }
    
    // Hàm kích hoạt Google Translate sang tiếng Anh
    function triggerTranslateToEnglish() {
        if (isTranslating) return;
        isTranslating = true;
        
        try {
            const iframe = document.getElementById('contentFrame');
            if (!iframe || !iframe.contentWindow || !iframe.contentDocument) {
                isTranslating = false;
                if (translateAttempts < MAX_ATTEMPTS) {
                    translateAttempts++;
                    setTimeout(triggerTranslateToEnglish, 500);
                }
                return;
            }
            
            const iframeDoc = iframe.contentDocument;
            const select = iframeDoc.querySelector('.goog-te-combo');
            
            if (select) {
                select.value = 'en';
                select.dispatchEvent(new Event('change'));
                console.log('Auto-translated to English');
                
                setTimeout(() => {
                    hideGoogleTranslateElements(iframeDoc);
                }, 200);
            } else {
                isTranslating = false;
                if (translateAttempts < MAX_ATTEMPTS) {
                    translateAttempts++;
                    setTimeout(triggerTranslateToEnglish, 500);
                }
            }
        } catch(e) {
            isTranslating = false;
            if (translateAttempts < MAX_ATTEMPTS) {
                translateAttempts++;
                setTimeout(triggerTranslateToEnglish, 500);
            }
        }
    }
    
    // Hàm ẩn tất cả các thành phần Google Translate
    function hideGoogleTranslateElements(doc) {
        if (!doc) return;
        
        const hideSelectors = [
            '.goog-te-banner-frame',
            '.goog-te-menu-frame',
            '.goog-te-ftab-frame',
            '.goog-te-gadget-simple',
            '.goog-te-spinner-pos',
            '.goog-te-balloon-frame',
            '.skiptranslate',
            '.goog-te-gadget',
            '#google_translate_element',
            '.goog-te-banner'
        ];
        
        hideSelectors.forEach(selector => {
            const elements = doc.querySelectorAll(selector);
            elements.forEach(el => {
                if (el) el.style.display = 'none';
            });
        });
        
        if (doc.body) {
            doc.body.style.top = '0px';
            doc.body.style.position = 'relative';
        }
    }
    
    // Hàm thêm Google Translate vào iframe và tự động dịch
    function injectTranslateToIframe() {
        try {
            const iframe = document.getElementById('contentFrame');
            if (!iframe || !iframe.contentWindow || !iframe.contentDocument) {
                setTimeout(injectTranslateToIframe, 500);
                return;
            }
            
            const iframeDoc = iframe.contentDocument;
            const iframeWin = iframe.contentWindow;
            
            if (iframeDoc.querySelector('#google-translate-script')) {
                triggerTranslateToEnglish();
                return;
            }
            
            if (!iframeDoc.querySelector('meta[name="viewport"]')) {
                const meta = iframeDoc.createElement('meta');
                meta.name = 'viewport';
                meta.content = 'width=device-width, initial-scale=1.0';
                iframeDoc.head.appendChild(meta);
            }
            
            iframeWin.setupGoogleTranslate = function() {
                if (iframeWin.google && iframeWin.google.translate) {
                    new iframeWin.google.translate.TranslateElement({
                        pageLanguage: 'vi',
                        includedLanguages: 'en',
                        layout: iframeWin.google.translate.TranslateElement.InlineLayout.SIMPLE,
                        autoDisplay: true
                    }, 'google_translate_element');
                    
                    setTimeout(() => {
                        hideGoogleTranslateElements(iframeDoc);
                        triggerTranslateToEnglish();
                    }, 300);
                }
            };
            
            const script = iframeDoc.createElement('script');
            script.id = 'google-translate-script';
            script.src = 'https://translate.google.com/translate_a/element.js?cb=setupGoogleTranslate';
            script.async = true;
            iframeDoc.head.appendChild(script);
            
            const translateDiv = iframeDoc.createElement('div');
            translateDiv.id = 'google_translate_element';
            translateDiv.style.position = 'absolute';
            translateDiv.style.visibility = 'hidden';
            translateDiv.style.width = '0';
            translateDiv.style.height = '0';
            translateDiv.style.pointerEvents = 'none';
            iframeDoc.body.appendChild(translateDiv);
            
            const style = iframeDoc.createElement('style');
            style.textContent = `
                .goog-te-banner-frame, .goog-te-menu-frame, .goog-te-ftab-frame,
                .goog-te-gadget-simple, .goog-te-spinner-pos, .goog-te-balloon-frame,
                .skiptranslate, .goog-te-gadget, #google_translate_element,
                .goog-te-banner { display: none !important; }
                body { top: 0px !important; position: relative !important; }
            `;
            iframeDoc.head.appendChild(style);
            
        } catch(e) {
            console.error('Inject error:', e);
            setTimeout(injectTranslateToIframe, 1000);
        }
    }
    
    // Hàm tải trang vào iframe
    async function loadPageToIframe(url) {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.display = 'flex';
        
        const iframe = document.getElementById('contentFrame');
        iframe.src = url;
        
        iframe.onload = function() {
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
                injectTranslateToIframe();
            }, 800);
        };
        
        iframe.onerror = function() {
            loadingOverlay.style.display = 'none';
            alert('Cannot load the page. Please check your connection.');
        };
    }
    
    // Khởi tạo
    async function init() {
        targetUrl = localStorage.getItem('pendingTranslateUrl') || './index.html';
        
        const btnVi = document.getElementById('btnVi');
        const btnEn = document.getElementById('btnEn');
        
        // Xóa hết các sự kiện cũ
        const newBtnVi = btnVi.cloneNode(true);
        const newBtnEn = btnEn.cloneNode(true);
        btnVi.parentNode.replaceChild(newBtnVi, btnVi);
        btnEn.parentNode.replaceChild(newBtnEn, btnEn);
        
        const finalBtnVi = document.getElementById('btnVi');
        const finalBtnEn = document.getElementById('btnEn');
        
        finalBtnVi.onclick = function(e) {
            e.preventDefault();
            e.stopPropagation();
            window.location.href = targetUrl;
        };
        
        finalBtnEn.onclick = function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            finalBtnEn.classList.add('active');
            finalBtnVi.classList.remove('active');
            
            setTimeout(() => {
                try {
                    const iframe = document.getElementById('contentFrame');
                    const select = iframe.contentWindow.document.querySelector('.goog-te-combo');
                    if (select && select.value !== 'en') {
                        select.value = 'en';
                        select.dispatchEvent(new Event('change'));
                    }
                } catch(e) {}
            }, 500);
        };
        
        await loadPageToIframe(targetUrl);
        
        setTimeout(() => {
            localStorage.removeItem('pendingTranslateUrl');
        }, 1000);
        
        // Bảo vệ các nút
        observeAndProtectButtons();
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</body>
</html>
