<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NhàĐẹp.vn - English Version</title>
    <meta name="robots" content="noindex, nofollow">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Open Sans', system-ui, sans-serif;
            background: #0A0A0A;
            color: #F5F5F5;
            overflow: hidden;
        }
        
        .iframe-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            background: #0A0A0A;
        }
        
        iframe {
            width: 100%; height: 100%;
            border: none;
            background: #0A0A0A;
        }

        /* ==================== NÚT VI/EN MỚI (bắt chước đúng code bạn đưa) ==================== */
        .lang-switch-bottom {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 1px;                    /* sát gần như chạm */
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 3px;
            border: 1px solid rgba(198,164,59,0.3);
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .lang-switch-bottom .lang-btn-bottom {
            background: none;
            border: none;
            color: #9C9C9C;
            cursor: pointer;
            font-size: 0.82rem;
            padding: 8px 15px;           /* gọn hơn */
            border-radius: 50px;
            transition: all 0.2s;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            white-space: nowrap;
            min-width: 68px;
        }
        
        .lang-switch-bottom .lang-btn-bottom:hover {
            background: rgba(198,164,59,0.18);
            color: #C6A43B;
        }

        .lang-switch-bottom .lang-btn-bottom.active {
            background: rgba(198,164,59,0.28);
            color: #C6A43B;
        }
        
        @media (max-width: 768px) {
            .lang-switch-bottom {
                bottom: 16px;
                right: 16px;
                padding: 3px;
                gap: 0px;
            }
            .lang-switch-bottom .lang-btn-bottom {
                padding: 7px 13px;
                font-size: 0.73rem;
                min-width: 64px;
            }
        }
        /* ==================== KẾT THÚC PHẦN NÚT MỚI ==================== */

        .goog-te-banner-frame, .goog-te-menu-frame, .goog-te-ftab-frame,
        .goog-te-gadget-simple, .goog-te-spinner-pos, .goog-te-balloon-frame,
        .skiptranslate, .goog-te-gadget, #google_translate_element, .goog-te-banner {
            display: none !important;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(198,164,59,0.2);
            border-top-color: #C6A43B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-text {
            color: #C6A43B;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading English version...</div>
</div>

<div class="iframe-container">
    <iframe id="contentFrame" src="about:blank"></iframe>
</div>

<!-- Nút chuyển đổi ngôn ngữ (đã thay class theo đúng code bạn đưa) -->
<div class="lang-switch-bottom">
    <button class="lang-btn-bottom" id="btnVi">🇻🇳 VI</button>
    <button class="lang-btn-bottom active" id="btnEn">🇬🇧 EN</button>
</div>

<script>
    let targetUrl = '';
    let currentVietnameseUrl = '';   
    
    function handleIframeLoad() {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.display = 'none';
        
        try {
            const iframe = document.getElementById('contentFrame');
            if (!iframe || !iframe.contentDocument) return;
            
            const iframeDoc = iframe.contentDocument;
            
            removeAllLanguageButtons(iframeDoc);
            hideGoogleTranslateElements(iframeDoc);
            injectTranslateToIframe();
            
            const loc = iframe.contentWindow.location.href;
            if (loc && loc !== 'about:blank' && !loc.includes('entrans.html')) {
                currentVietnameseUrl = loc;
                console.log('📍 Current Vietnamese URL updated:', currentVietnameseUrl);
            }
        } catch (e) {
            console.error('Handle iframe load error:', e);
            setTimeout(handleIframeLoad, 400);
        }
    }
    
    function removeAllLanguageButtons(doc) {
        if (!doc) return;
        const selectors = ['.lang-switch','.lang-nav-btn','.lang-tag-btn','.lang-btn','.lang-buttons','.translate-toolbar','[onclick*="switchLanguage"]','.lang-en-switch'];
        selectors.forEach(sel => doc.querySelectorAll(sel).forEach(el => el.remove()));
        
        doc.querySelectorAll('button, a, div').forEach(el => {
            const text = el.textContent || '';
            if ((text.includes('VI') || text.includes('EN') || text.includes('🇻🇳') || text.includes('🇬🇧')) &&
                (el.tagName === 'BUTTON' || el.classList.contains('lang-btn') || el.classList.contains('lang-nav-btn'))) {
                el.remove();
            }
        });
    }
    
    function triggerTranslateToEnglish() {
        try {
            const iframe = document.getElementById('contentFrame');
            if (!iframe?.contentDocument) return;
            const select = iframe.contentDocument.querySelector('.goog-te-combo');
            if (select && select.value !== 'en') {
                select.value = 'en';
                select.dispatchEvent(new Event('change'));
                setTimeout(() => {
                    hideGoogleTranslateElements(iframe.contentDocument);
                    removeAllLanguageButtons(iframe.contentDocument);
                }, 200);
            }
        } catch(e) {}
    }
    
    function hideGoogleTranslateElements(doc) {
        if (!doc) return;
        const selectors = ['.goog-te-banner-frame','.goog-te-menu-frame','.goog-te-ftab-frame','.goog-te-gadget-simple','.goog-te-spinner-pos','.goog-te-balloon-frame','.skiptranslate','.goog-te-gadget','#google_translate_element','.goog-te-banner'];
        selectors.forEach(sel => doc.querySelectorAll(sel).forEach(el => el.style.display = 'none'));
        if (doc.body) {
            doc.body.style.top = '0px';
            doc.body.style.position = 'relative';
        }
    }
    
    async function fetchAndCleanContent(url) {
        try {
            const response = await fetch(url);
            let html = await response.text();
            html = html.replace(/<div[^>]*class="[^"]*lang-switch[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*lang-buttons[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<button[^>]*class="[^"]*lang-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '');
            html = html.replace(/<button[^>]*class="[^"]*lang-nav-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*translate-toolbar[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*lang-en-switch[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/function switchLanguage[^{]*\{[\s\S]*?\}/gi, '');
            html = html.replace(/switchLanguage\s*\([^)]*\)/gi, '');
            return html;
        } catch(e) {
            console.error('Fetch error:', e);
            return null;
        }
    }
    
    async function loadCleanedContent() {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.display = 'flex';
        
        const iframe = document.getElementById('contentFrame');
        iframe.onload = handleIframeLoad;
        
        const cleanedHtml = await fetchAndCleanContent(targetUrl);
        
        if (!cleanedHtml) {
            iframe.src = targetUrl;
            return;
        }
        
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(cleanedHtml);
        iframeDoc.close();
    }
    
    function injectTranslateToIframe() {
        try {
            const iframe = document.getElementById('contentFrame');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            const iframeWin = iframe.contentWindow;
            
            if (iframeDoc.querySelector('#google-translate-script')) {
                triggerTranslateToEnglish();
                return;
            }
            
            iframeWin.setupGoogleTranslate = function() {
                if (iframeWin.google?.translate) {
                    new iframeWin.google.translate.TranslateElement({
                        pageLanguage: 'vi',
                        includedLanguages: 'en',
                        layout: iframeWin.google.translate.TranslateElement.InlineLayout.SIMPLE,
                        autoDisplay: true
                    }, 'google_translate_element');
                    
                    setTimeout(() => {
                        hideGoogleTranslateElements(iframeDoc);
                        removeAllLanguageButtons(iframeDoc);
                        triggerTranslateToEnglish();
                    }, 300);
                }
            };
            
            const script = iframeDoc.createElement('script');
            script.id = 'google-translate-script';
            script.src = 'https://translate.google.com/translate_a/element.js?cb=setupGoogleTranslate';
            script.async = true;
            iframeDoc.head.appendChild(script);
            
            const translateDiv = iframeDoc.createElement('div');
            translateDiv.id = 'google_translate_element';
            translateDiv.style.position = 'absolute';
            translateDiv.style.visibility = 'hidden';
            translateDiv.style.width = '0';
            translateDiv.style.height = '0';
            iframeDoc.body.appendChild(translateDiv);
            
            const style = iframeDoc.createElement('style');
            style.textContent = `
                .goog-te-banner-frame, .goog-te-menu-frame, .goog-te-ftab-frame,
                .goog-te-gadget-simple, .goog-te-spinner-pos, .goog-te-balloon-frame,
                .skiptranslate, .goog-te-gadget, #google_translate_element,
                .goog-te-banner { display: none !important; }
                body { top: 0px !important; position: relative !important; }
            `;
            iframeDoc.head.appendChild(style);
        } catch(e) {
            console.error('Inject error:', e);
            setTimeout(injectTranslateToIframe, 500);
        }
    }
    
    function handleEnClick() {
        document.getElementById('btnEn').classList.add('active');
        document.getElementById('btnVi').classList.remove('active');
        
        setTimeout(() => {
            try {
                const select = document.getElementById('contentFrame').contentDocument.querySelector('.goog-te-combo');
                if (select && select.value !== 'en') {
                    select.value = 'en';
                    select.dispatchEvent(new Event('change'));
                }
            } catch(e) {}
        }, 200);
    }
    
    function handleViClick() {
        const urlToGo = currentVietnameseUrl || targetUrl || './index.html';
        console.log('🔄 Chuyển sang tiếng Việt trang:', urlToGo);
        window.top.location.href = urlToGo;
    }
    
    async function init() {
        targetUrl = localStorage.getItem('pendingTranslateUrl') || './index.html';
        currentVietnameseUrl = targetUrl;                    
        
        document.getElementById('btnVi').onclick = handleViClick;
        document.getElementById('btnEn').onclick = handleEnClick;
        
        await loadCleanedContent();
        
        setTimeout(() => localStorage.removeItem('pendingTranslateUrl'), 1000);
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</body>
</html>
