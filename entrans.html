<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NhàĐẹp.vn - English Version</title>
    <meta name="robots" content="noindex, nofollow">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B51EJTDD2L"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Open Sans', system-ui, sans-serif;
            background: #0A0A0A;
            color: #F5F5F5;
            overflow: hidden;
        }
        
        .iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: #0A0A0A;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0A0A0A;
        }
        
        .lang-buttons {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 0px;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 4px;
            border: 1px solid rgba(198,164,59,0.3);
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .lang-btn {
            background: none;
            border: none;
            color: #9C9C9C;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 30px;
            transition: all 0.2s;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            margin: 0;
        }
        
        .lang-btn.active {
            background: rgba(198,164,59,0.25);
            color: #C6A43B;
        }
        
        .lang-btn:hover {
            background: rgba(198,164,59,0.15);
            color: #C6A43B;
        }
        
        .goog-te-banner-frame,
        .goog-te-menu-frame,
        .goog-te-ftab-frame,
        .goog-te-gadget-simple,
        .goog-te-spinner-pos,
        .goog-te-balloon-frame,
        .skiptranslate,
        .goog-te-gadget,
        #google_translate_element,
        .goog-te-banner {
            display: none !important;
        }
        
        body {
            top: 0px !important;
            position: relative !important;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(198,164,59,0.2);
            border-top-color: #C6A43B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #C6A43B;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        
        @media (max-width: 768px) {
            .lang-buttons {
                bottom: 16px;
                right: 16px;
                padding: 3px;
            }
            .lang-btn {
                padding: 5px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading English version...</div>
</div>

<div class="iframe-container">
    <iframe id="contentFrame" src="about:blank"></iframe>
</div>

<div class="lang-buttons">
    <button class="lang-btn" id="btnVi">🇻🇳 VI</button>
    <button class="lang-btn active" id="btnEn">🇬🇧 EN</button>
</div>

<script>
    let targetUrl = '';
    let isFirstLoad = true;
    let currentBaseUrl = '';
    
    // Lấy origin (https://nhadepviet.org)
    const ORIGIN = window.location.origin;
    
    // Hàm chuyển đổi đường dẫn tương đối thành tuyệt đối - ĐÃ SỬA
    function resolveRelativePath(href, currentPageUrl) {
        if (!href) return null;
        
        // Loại bỏ khoảng trắng
        href = href.trim();
        
        // Nếu đã là URL tuyệt đối
        if (href.startsWith('http://') || href.startsWith('https://')) {
            return href;
        }
        
        // Nếu bắt đầu bằng //
        if (href.startsWith('//')) {
            return 'https:' + href;
        }
        
        // Nếu bắt đầu bằng / (tuyệt đối từ gốc)
        if (href.startsWith('/')) {
            return ORIGIN + href;
        }
        
        // Xử lý đường dẫn tương đối
        // Lấy thư mục của trang hiện tại (không bao gồm tên file)
        let basePath = currentPageUrl;
        
        // Loại bỏ phần query string và hash
        basePath = basePath.split('?')[0].split('#')[0];
        
        // Nếu basePath kết thúc bằng .html thì lấy thư mục cha
        if (basePath.endsWith('.html')) {
            const lastSlash = basePath.lastIndexOf('/');
            if (lastSlash > 0) {
                basePath = basePath.substring(0, lastSlash + 1);
            }
        } else if (!basePath.endsWith('/')) {
            basePath = basePath + '/';
        }
        
        // Xử lý ./
        if (href.startsWith('./')) {
            href = href.substring(2);
        }
        
        // Xử lý ../
        let result = basePath + href;
        
        // Giải quyết các đoạn ../
        let parts = result.split('/');
        let newParts = [];
        for (let i = 0; i < parts.length; i++) {
            if (parts[i] === '..') {
                newParts.pop();
            } else if (parts[i] !== '.' && parts[i] !== '') {
                newParts.push(parts[i]);
            }
        }
        result = newParts.join('/');
        
        // Đảm bảo có protocol
        if (!result.startsWith('http')) {
            result = ORIGIN + '/' + result.replace(/^\/+/, '');
        }
        
        return result;
    }
    
    // Hàm lấy base URL từ iframe
    function getIframeBaseUrl(iframeWin) {
        try {
            // Thử lấy từ iframe
            return iframeWin.location.href;
        } catch(e) {
            // Cross-origin, dùng URL đã lưu
            return currentBaseUrl;
        }
    }
    
    // Hàm chặn tất cả link trong iframe - ĐÃ SỬA
    function interceptIframeLinks(iframeDoc, iframeWin) {
        if (!iframeDoc) return;
        
        const handleLinkClick = function(e, link) {
            e.preventDefault();
            e.stopPropagation();
            
            let href = link.getAttribute('data-original-href') || link.getAttribute('href');
            if (!href || href === '#') return;
            
            // Lấy base URL từ iframe
            let baseUrl = getIframeBaseUrl(iframeWin);
            if (!baseUrl || baseUrl === 'about:blank') {
                baseUrl = currentBaseUrl;
            }
            
            let absoluteUrl = resolveRelativePath(href, baseUrl);
            
            // Bỏ qua nếu là link về entrans.html
            if (absoluteUrl && absoluteUrl.includes('/entrans.html')) {
                return;
            }
            
            if (absoluteUrl && absoluteUrl !== window.location.href) {
                console.log('Chuyển hướng đến:', absoluteUrl);
                localStorage.setItem('pendingTranslateUrl', absoluteUrl);
                window.location.href = '/entrans.html';
            }
        };
        
        // Xử lý tất cả thẻ a hiện tại
        const allLinks = iframeDoc.querySelectorAll('a');
        allLinks.forEach(link => {
            const originalHref = link.getAttribute('href');
            if (!originalHref || originalHref === '#' || originalHref.startsWith('javascript:')) return;
            
            link.setAttribute('data-original-href', originalHref);
            link.style.cursor = 'pointer';
            link.removeAttribute('onclick');
            
            // Gắn sự kiện mới
            link.addEventListener('click', function(e) {
                handleLinkClick(e, this);
            });
        });
        
        // Chặn sự kiện click trên body cho link được tạo động
        iframeDoc.body.addEventListener('click', function(e) {
            let target = e.target;
            while (target && target !== iframeDoc.body) {
                if (target.tagName === 'A') {
                    const href = target.getAttribute('href');
                    if (href && href !== '#' && !href.startsWith('javascript:') && !href.includes('/entrans.html')) {
                        e.preventDefault();
                        e.stopPropagation();
                        
                        let baseUrl = getIframeBaseUrl(iframeWin);
                        if (!baseUrl || baseUrl === 'about:blank') {
                            baseUrl = currentBaseUrl;
                        }
                        
                        let absoluteUrl = resolveRelativePath(href, baseUrl);
                        if (absoluteUrl && !absoluteUrl.includes('/entrans.html')) {
                            console.log('Chuyển hướng đến (dynamic):', absoluteUrl);
                            localStorage.setItem('pendingTranslateUrl', absoluteUrl);
                            window.location.href = '/entrans.html';
                        }
                    }
                    break;
                }
                target = target.parentElement;
            }
        }, true);
    }
    
    function fixHomeLinksInIframe(iframeDoc) {
        if (!iframeDoc) return;
        
        const allLinks = iframeDoc.querySelectorAll('a[href]');
        allLinks.forEach(link => {
            const linkText = link.textContent || '';
            
            if (linkText.includes('Về trang chủ') || 
                linkText.includes('Back to home') ||
                linkText.includes('← Về trang chủ') ||
                linkText.includes('← Quay lại trang chủ') ||
                link.classList.contains('back-btn')) {
                link.setAttribute('data-original-href', '/');
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = '/';
                });
            }
        });
    }
    
    function removeAllLanguageButtons(doc) {
        if (!doc) return;
        const selectorsToRemove = [
            '.lang-switch', '.lang-nav-btn', '.lang-tag-btn', '.lang-btn',
            '.lang-buttons', '.translate-toolbar', '[onclick*="switchLanguage"]', '.lang-en-switch'
        ];
        selectorsToRemove.forEach(selector => {
            const elements = doc.querySelectorAll(selector);
            elements.forEach(el => { if (el) el.remove(); });
        });
    }
    
    function triggerTranslateToEnglish(iframeDoc, iframeWin) {
        try {
            const select = iframeDoc.querySelector('.goog-te-combo');
            if (select && select.value !== 'en') {
                select.value = 'en';
                select.dispatchEvent(new Event('change'));
                setTimeout(() => {
                    hideGoogleTranslateElements(iframeDoc);
                    removeAllLanguageButtons(iframeDoc);
                    interceptIframeLinks(iframeDoc, iframeWin);
                    fixHomeLinksInIframe(iframeDoc);
                }, 500);
            }
        } catch(e) {
            console.log('Trigger translate error:', e);
        }
    }
    
    function hideGoogleTranslateElements(doc) {
        if (!doc) return;
        const hideSelectors = [
            '.goog-te-banner-frame', '.goog-te-menu-frame', '.goog-te-ftab-frame',
            '.goog-te-gadget-simple', '.goog-te-spinner-pos', '.goog-te-balloon-frame',
            '.skiptranslate', '.goog-te-gadget', '#google_translate_element', '.goog-te-banner'
        ];
        hideSelectors.forEach(selector => {
            const elements = doc.querySelectorAll(selector);
            elements.forEach(el => { if (el) el.style.display = 'none'; });
        });
        if (doc.body) {
            doc.body.style.top = '0px';
            doc.body.style.position = 'relative';
        }
    }
    
    async function loadContent() {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.display = 'flex';
        
        const iframe = document.getElementById('contentFrame');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        
        try {
            const response = await fetch(targetUrl);
            let html = await response.text();
            
            // Xóa các thành phần không cần thiết
            html = html.replace(/<div[^>]*class="[^"]*lang-switch[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*lang-buttons[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<button[^>]*class="[^"]*lang-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '');
            html = html.replace(/<button[^>]*class="[^"]*lang-nav-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*translate-toolbar[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/function switchLanguage[^{]*\{[\s\S]*?\}/gi, '');
            html = html.replace(/switchLanguage\s*\([^)]*\)/gi, '');
            
            iframeDoc.open();
            iframeDoc.write(html);
            iframeDoc.close();
            
            currentBaseUrl = targetUrl;
            
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
                if (isFirstLoad) {
                    isFirstLoad = false;
                    removeAllLanguageButtons(iframeDoc);
                    injectTranslateToIframe();
                }
            }, 800);
            
        } catch(e) {
            console.error('Load content error:', e);
            iframe.src = targetUrl;
            currentBaseUrl = targetUrl;
            iframe.onload = function() {
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                    if (isFirstLoad) {
                        isFirstLoad = false;
                        setTimeout(() => {
                            const iframeDoc2 = iframe.contentDocument;
                            const iframeWin2 = iframe.contentWindow;
                            removeAllLanguageButtons(iframeDoc2);
                            injectTranslateToIframe();
                        }, 500);
                    }
                }, 800);
            };
        }
    }
    
    function injectTranslateToIframe() {
        try {
            const iframe = document.getElementById('contentFrame');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            const iframeWin = iframe.contentWindow;
            
            if (iframeDoc.querySelector('#google-translate-script')) {
                triggerTranslateToEnglish(iframeDoc, iframeWin);
                return;
            }
            
            iframeWin.setupGoogleTranslate = function() {
                if (iframeWin.google && iframeWin.google.translate) {
                    new iframeWin.google.translate.TranslateElement({
                        pageLanguage: 'vi',
                        includedLanguages: 'en',
                        layout: iframeWin.google.translate.TranslateElement.InlineLayout.SIMPLE,
                        autoDisplay: true
                    }, 'google_translate_element');
                    setTimeout(() => {
                        hideGoogleTranslateElements(iframeDoc);
                        removeAllLanguageButtons(iframeDoc);
                        interceptIframeLinks(iframeDoc, iframeWin);
                        fixHomeLinksInIframe(iframeDoc);
                        triggerTranslateToEnglish(iframeDoc, iframeWin);
                    }, 300);
                }
            };
            
            const script = iframeDoc.createElement('script');
            script.id = 'google-translate-script';
            script.src = 'https://translate.google.com/translate_a/element.js?cb=setupGoogleTranslate';
            script.async = true;
            iframeDoc.head.appendChild(script);
            
            const translateDiv = iframeDoc.createElement('div');
            translateDiv.id = 'google_translate_element';
            translateDiv.style.position = 'absolute';
            translateDiv.style.visibility = 'hidden';
            translateDiv.style.width = '0';
            translateDiv.style.height = '0';
            iframeDoc.body.appendChild(translateDiv);
            
            const style = iframeDoc.createElement('style');
            style.textContent = `
                .goog-te-banner-frame, .goog-te-menu-frame, .goog-te-ftab-frame,
                .goog-te-gadget-simple, .goog-te-spinner-pos, .goog-te-balloon-frame,
                .skiptranslate, .goog-te-gadget, #google_translate_element,
                .goog-te-banner { display: none !important; }
                body { top: 0px !important; position: relative !important; }
            `;
            iframeDoc.head.appendChild(style);
            
        } catch(e) {
            console.error('Inject error:', e);
            setTimeout(injectTranslateToIframe, 500);
        }
    }
    
    function handleEnClick() {
        const btnVi = document.getElementById('btnVi');
        const btnEn = document.getElementById('btnEn');
        btnEn.classList.add('active');
        btnVi.classList.remove('active');
        
        setTimeout(() => {
            try {
                const iframe = document.getElementById('contentFrame');
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const iframeWin = iframe.contentWindow;
                const select = iframeDoc.querySelector('.goog-te-combo');
                if (select && select.value !== 'en') {
                    select.value = 'en';
                    select.dispatchEvent(new Event('change'));
                }
            } catch(e) {}
        }, 200);
    }
    
    function handleViClick() {
        window.location.href = targetUrl;
    }
    
    async function init() {
        targetUrl = localStorage.getItem('pendingTranslateUrl') || '/';
        currentBaseUrl = targetUrl;
        
        const btnVi = document.getElementById('btnVi');
        const btnEn = document.getElementById('btnEn');
        btnVi.onclick = handleViClick;
        btnEn.onclick = handleEnClick;
        
        await loadContent();
        
        setTimeout(() => {
            if (!localStorage.getItem('pendingTranslateUrl')) {
                localStorage.removeItem('pendingTranslateUrl');
            }
        }, 2000);
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</body>
</html>
