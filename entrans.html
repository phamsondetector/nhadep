<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NhàĐẹp.vn - English Version</title>
    <meta name="robots" content="noindex, nofollow">
    
    <!-- SEO: Alternate tags -->
    <link rel="alternate" hreflang="vi" href="https://nhadep.vn/" />
    <link rel="alternate" hreflang="en" href="https://nhadep.vn/en/" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Open Sans', system-ui, sans-serif;
            background: #0A0A0A;
            color: #F5F5F5;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .lang-switch-bottom {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 1px;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 3px;
            border: 1px solid rgba(198,164,59,0.3);
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .lang-switch-bottom a {
            background: none;
            border: none;
            color: #9C9C9C;
            cursor: pointer;
            font-size: 0.82rem;
            padding: 8px 15px;
            border-radius: 50px;
            transition: all 0.2s;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            white-space: nowrap;
            min-width: 68px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .lang-switch-bottom a:hover {
            background: rgba(198,164,59,0.18);
            color: #C6A43B;
        }

        .lang-switch-bottom a.active {
            background: rgba(198,164,59,0.28);
            color: #C6A43B;
        }
        
        .content {
            background: #111;
            border-radius: 16px;
            padding: 40px;
            margin-top: 20px;
        }
        
        h1 {
            color: #C6A43B;
            margin-bottom: 20px;
        }
        
        p {
            line-height: 1.6;
            margin-bottom: 15px;
            color: #ddd;
        }
        
        @media (max-width: 768px) {
            .lang-switch-bottom {
                bottom: 16px;
                right: 16px;
                padding: 3px;
            }
            .lang-switch-bottom a {
                padding: 7px 13px;
                font-size: 0.73rem;
                min-width: 64px;
            }
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>🏠 NhàĐẹp.vn - English</h1>
            <p>Welcome to the English version of NhàĐẹp.vn. This page is under construction.</p>
            <p>Please check back later for the full English experience.</p>
            <p>For now, you can visit our <a href="/" style="color:#C6A43B;">Vietnamese homepage</a>.</p>
        </div>
    </div>

    <div class="lang-switch-bottom">
        <a href="/" id="btnVi">🇻🇳 VI</a>
        <a href="/en/" class="active" id="btnEn">🇬🇧 EN</a>
    </div>

    <script>
        // Chuyển hướng về trang chủ tiếng Việt nếu cần
        document.getElementById('btnVi').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = '/';
        });
        
        document.getElementById('btnEn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = '/en/';
        });
    </script>
</body>
</html>
