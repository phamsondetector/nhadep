<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NhàĐẹp.vn - English Version</title>
    <meta name="robots" content="noindex, nofollow">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Open Sans', system-ui, sans-serif;
            background: #0A0A0A;
            color: #F5F5F5;
            overflow: hidden;
        }
        
        .iframe-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            background: #0A0A0A;
        }
        
        iframe {
            width: 100%; height: 100%;
            border: none;
            background: #0A0A0A;
        }

        .lang-switch-bottom {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 1px;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 3px;
            border: 1px solid rgba(198,164,59,0.3);
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .lang-switch-bottom .lang-btn-bottom {
            background: none;
            border: none;
            color: #9C9C9C;
            cursor: pointer;
            font-size: 0.82rem;
            padding: 8px 15px;
            border-radius: 50px;
            transition: all 0.2s;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            white-space: nowrap;
            min-width: 68px;
        }
        
        .lang-switch-bottom .lang-btn-bottom:hover {
            background: rgba(198,164,59,0.18);
            color: #C6A43B;
        }

        .lang-switch-bottom .lang-btn-bottom.active {
            background: rgba(198,164,59,0.28);
            color: #C6A43B;
        }
        
        @media (max-width: 768px) {
            .lang-switch-bottom {
                bottom: 16px;
                right: 16px;
                padding: 3px;
                gap: 0px;
            }
            .lang-switch-bottom .lang-btn-bottom {
                padding: 7px 13px;
                font-size: 0.73rem;
                min-width: 64px;
            }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading English version...</div>
</div>

<div class="iframe-container">
    <iframe id="contentFrame" src="about:blank"></iframe>
</div>

<div class="lang-switch-bottom">
    <button class="lang-btn-bottom" id="btnVi">🇻🇳 VI</button>
    <button class="lang-btn-bottom active" id="btnEn">🇬🇧 EN</button>
</div>

<script>
    let targetUrl = '';
    let currentVietnameseUrl = '';
    let translations = {};        // ← JSON dịch sẽ được load vào đây

    // ==================== LOAD FILE JSON DỊCH (EN) ====================
    async function loadTranslations() {
        try {
            const response = await fetch('./locales/en.json');
            if (!response.ok) throw new Error('en.json not found');
            translations = await response.json();
            console.log('✅ Loaded English translations:', Object.keys(translations).length, 'keys');
        } catch (e) {
            console.warn('⚠️ Không tìm thấy ./locales/en.json – Dùng fallback (vẫn hiển thị tiếng Việt)');
            translations = {};
        }
    }

    // ==================== ÁP DỊCH VÀO IFRAME ====================
    function applyTranslations(doc) {
        if (Object.keys(translations).length === 0) return;

        // 1. Dịch theo data-i18n (nếu bạn đã thêm attribute này vào HTML gốc)
        doc.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[key]) {
                if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                    el.placeholder = translations[key];
                } else {
                    el.innerHTML = translations[key];
                }
            }
        });

        // 2. Dịch text nodes (cách phổ biến nhất khi chưa thêm data-i18n)
        const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while (node = walker.nextNode()) {
            const originalText = node.textContent.trim();
            if (originalText && translations[originalText]) {
                node.textContent = translations[originalText];
            }
        }

        console.log('✅ Applied English translation');
    }

    function handleIframeLoad() {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.display = 'none';
        
        try {
            const iframe = document.getElementById('contentFrame');
            if (!iframe || !iframe.contentDocument) return;
            
            const iframeDoc = iframe.contentDocument;
            
            // Xóa nút ngôn ngữ gốc trong iframe
            removeAllLanguageButtons(iframeDoc);
            
            // Áp dụng bản dịch tĩnh
            applyTranslations(iframeDoc);
            
            // Cập nhật URL Việt hiện tại
            const loc = iframe.contentWindow.location.href;
            if (loc && loc !== 'about:blank' && !loc.includes('entrans.html')) {
                currentVietnameseUrl = loc;
            }
        } catch (e) {
            setTimeout(handleIframeLoad, 400);
        }
    }
    
    function removeAllLanguageButtons(doc) {
        if (!doc) return;
        const selectors = ['.lang-switch','.lang-nav-btn','.lang-tag-btn','.lang-btn','.lang-buttons','.translate-toolbar','[onclick*="switchLanguage"]','.lang-en-switch'];
        selectors.forEach(sel => doc.querySelectorAll(sel).forEach(el => el.remove()));
    }
    
    async function fetchAndCleanContent(url) {
        try {
            const response = await fetch(url);
            let html = await response.text();
            // Xóa các nút ngôn ngữ gốc (giữ nguyên như cũ)
            html = html.replace(/<div[^>]*class="[^"]*lang-switch[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*lang-buttons[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<button[^>]*class="[^"]*lang-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '');
            html = html.replace(/<button[^>]*class="[^"]*lang-nav-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*translate-toolbar[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*lang-en-switch[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/function switchLanguage[^{]*\{[\s\S]*?\}/gi, '');
            html = html.replace(/switchLanguage\s*\([^)]*\)/gi, '');
            return html;
        } catch(e) {
            console.error('Fetch error:', e);
            return null;
        }
    }
    
    async function loadCleanedContent() {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.display = 'flex';
        
        const iframe = document.getElementById('contentFrame');
        iframe.onload = handleIframeLoad;
        
        const cleanedHtml = await fetchAndCleanContent(targetUrl);
        
        if (!cleanedHtml) {
            iframe.src = targetUrl;
            return;
        }
        
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(cleanedHtml);
        iframeDoc.close();
    }
    
    function handleEnClick() {
        document.getElementById('btnEn').classList.add('active');
        document.getElementById('btnVi').classList.remove('active');
        // Vì đã là bản dịch tĩnh nên không cần làm gì thêm
    }
    
    function handleViClick() {
        const urlToGo = currentVietnameseUrl || targetUrl || './index.html';
        window.top.location.href = urlToGo;
    }
    
    async function init() {
        targetUrl = localStorage.getItem('pendingTranslateUrl') || './index.html';
        currentVietnameseUrl = targetUrl;
        
        // Load JSON trước khi load nội dung
        await loadTranslations();
        
        document.getElementById('btnVi').onclick = handleViClick;
        document.getElementById('btnEn').onclick = handleEnClick;
        
        await loadCleanedContent();
        
        setTimeout(() => localStorage.removeItem('pendingTranslateUrl'), 1000);
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</body>
</html>
