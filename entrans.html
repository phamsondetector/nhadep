<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NhàĐẹp.vn - English Version</title>
    <meta name="robots" content="noindex, nofollow">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Open Sans', system-ui, sans-serif;
            background: #0A0A0A;
            color: #F5F5F5;
            overflow: hidden;
        }
        
        /* Khung iframe chứa nội dung - chiếm toàn màn hình */
        .iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: #0A0A0A;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0A0A0A;
        }
        
        /* Nút VI/EN ở góc phải dưới */
        .lang-buttons {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 8px;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 6px;
            border: 1px solid rgba(198,164,59,0.3);
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .lang-btn {
            background: none;
            border: none;
            color: #9C9C9C;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 8px 20px;
            border-radius: 30px;
            transition: all 0.2s;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
        }
        
        .lang-btn.active {
            background: rgba(198,164,59,0.25);
            color: #C6A43B;
        }
        
        .lang-btn:hover {
            background: rgba(198,164,59,0.15);
            color: #C6A43B;
        }
        
        /* Ẩn hoàn toàn mọi thành phần của Google Translate */
        .goog-te-banner-frame,
        .goog-te-menu-frame,
        .goog-te-ftab-frame,
        .goog-te-gadget-simple,
        .goog-te-spinner-pos,
        .goog-te-balloon-frame,
        .skiptranslate,
        .goog-te-gadget,
        #google_translate_element,
        .goog-te-banner {
            display: none !important;
        }
        
        body {
            top: 0px !important;
            position: relative !important;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(198,164,59,0.2);
            border-top-color: #C6A43B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #C6A43B;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        
        @media (max-width: 768px) {
            .lang-buttons {
                bottom: 16px;
                right: 16px;
                padding: 4px;
            }
            .lang-btn {
                padding: 6px 14px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading English version...</div>
</div>

<div class="iframe-container">
    <iframe id="contentFrame" src="about:blank"></iframe>
</div>

<div class="lang-buttons">
    <button class="lang-btn" id="btnVi">🇻🇳 VI</button>
    <button class="lang-btn active" id="btnEn">🇬🇧 EN</button>
</div>

<script>
    let targetUrl = '';
    
    // =============================================
    // HÀM MỚI: Xử lý sau khi iframe load (rất quan trọng)
    // Mọi lần load trang mới (kể cả click link bên trong EN) đều chạy lại translator
    // =============================================
    function handleIframeLoad() {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.display = 'none';
        
        try {
            const iframe = document.getElementById('contentFrame');
            if (!iframe || !iframe.contentDocument) return;
            
            const iframeDoc = iframe.contentDocument;
            
            // Xóa nút ngôn ngữ gốc + ẩn Google Translate UI
            removeAllLanguageButtons(iframeDoc);
            hideGoogleTranslateElements(iframeDoc);
            
            // Tiêm lại Google Translate + tự động dịch sang EN
            injectTranslateToIframe();
            
            console.log('✅ Iframe loaded & translator re-applied successfully');
        } catch (e) {
            console.error('Handle iframe load error:', e);
            // Thử lại nếu iframe chưa sẵn sàng
            setTimeout(handleIframeLoad, 400);
        }
    }
    
    // Hàm xóa tất cả nút chuyển ngôn ngữ trong iframe (giữ nguyên)
    function removeAllLanguageButtons(doc) {
        if (!doc) return;
        
        const selectorsToRemove = [
            '.lang-switch',
            '.lang-nav-btn',
            '.lang-tag-btn',
            '.lang-btn',
            '.lang-buttons',
            '.translate-toolbar',
            '[onclick*="switchLanguage"]',
            '.lang-en-switch'
        ];
        
        selectorsToRemove.forEach(selector => {
            const elements = doc.querySelectorAll(selector);
            elements.forEach(el => el.remove());
        });
        
        const allElements = doc.querySelectorAll('button, a, div');
        allElements.forEach(el => {
            const text = el.textContent || '';
            if ((text.includes('VI') || text.includes('EN') || text.includes('🇻🇳') || text.includes('🇬🇧')) && 
                (el.tagName === 'BUTTON' || el.classList.contains('lang-btn') || el.classList.contains('lang-nav-btn'))) {
                el.remove();
            }
        });
    }
    
    // Hàm kích hoạt Google Translate (giữ nguyên)
    function triggerTranslateToEnglish() {
        try {
            const iframe = document.getElementById('contentFrame');
            if (!iframe || !iframe.contentWindow || !iframe.contentDocument) {
                setTimeout(triggerTranslateToEnglish, 300);
                return;
            }
            
            const iframeDoc = iframe.contentDocument;
            const select = iframeDoc.querySelector('.goog-te-combo');
            
            if (select && select.value !== 'en') {
                select.value = 'en';
                select.dispatchEvent(new Event('change'));
                console.log('Auto-translated to English');
                
                setTimeout(() => {
                    hideGoogleTranslateElements(iframeDoc);
                    removeAllLanguageButtons(iframeDoc);
                }, 200);
            } else if (!select) {
                setTimeout(triggerTranslateToEnglish, 300);
            }
        } catch(e) {
            setTimeout(triggerTranslateToEnglish, 300);
        }
    }
    
    // Hàm ẩn Google Translate elements (giữ nguyên)
    function hideGoogleTranslateElements(doc) {
        if (!doc) return;
        
        const hideSelectors = [
            '.goog-te-banner-frame',
            '.goog-te-menu-frame',
            '.goog-te-ftab-frame',
            '.goog-te-gadget-simple',
            '.goog-te-spinner-pos',
            '.goog-te-balloon-frame',
            '.skiptranslate',
            '.goog-te-gadget',
            '#google_translate_element',
            '.goog-te-banner'
        ];
        
        hideSelectors.forEach(selector => {
            const elements = doc.querySelectorAll(selector);
            elements.forEach(el => {
                if (el) el.style.display = 'none';
            });
        });
        
        if (doc.body) {
            doc.body.style.top = '0px';
            doc.body.style.position = 'relative';
        }
    }
    
    // Lấy nội dung HTML và loại bỏ nút chuyển ngôn ngữ (giữ nguyên)
    async function fetchAndCleanContent(url) {
        try {
            const response = await fetch(url);
            let html = await response.text();
            
            html = html.replace(/<div[^>]*class="[^"]*lang-switch[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*lang-buttons[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<button[^>]*class="[^"]*lang-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '');
            html = html.replace(/<button[^>]*class="[^"]*lang-nav-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*translate-toolbar[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*lang-en-switch[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            
            html = html.replace(/function switchLanguage[^{]*\{[\s\S]*?\}/gi, '');
            html = html.replace(/switchLanguage\s*\([^)]*\)/gi, '');
            
            return html;
        } catch(e) {
            console.error('Fetch error:', e);
            return null;
        }
    }
    
    // Tải nội dung (ĐÃ SỬA - luôn attach onload trước khi load)
    async function loadCleanedContent() {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.display = 'flex';
        
        const iframe = document.getElementById('contentFrame');
        
        // === PHẦN QUAN TRỌNG: Attach onload trước khi load bất kỳ nội dung nào ===
        // Nhờ đó, DÙ là load lần đầu hay click link bên trong iframe → đều chạy lại translator
        iframe.onload = handleIframeLoad;
        
        const cleanedHtml = await fetchAndCleanContent(targetUrl);
        
        if (!cleanedHtml) {
            console.log('Using direct src fallback');
            iframe.src = targetUrl;
            return;                    // onload sẽ tự chạy
        }
        
        // Trường hợp cleaned HTML
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(cleanedHtml);
        iframeDoc.close();
        // onload sẽ tự động chạy sau write/close
    }
    
    // Thêm Google Translate vào iframe (giữ nguyên)
    function injectTranslateToIframe() {
        try {
            const iframe = document.getElementById('contentFrame');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            const iframeWin = iframe.contentWindow;
            
            // Nếu script đã tồn tại (trường hợp hiếm) thì chỉ trigger
            if (iframeDoc.querySelector('#google-translate-script')) {
                triggerTranslateToEnglish();
                return;
            }
            
            iframeWin.setupGoogleTranslate = function() {
                if (iframeWin.google && iframeWin.google.translate) {
                    new iframeWin.google.translate.TranslateElement({
                        pageLanguage: 'vi',
                        includedLanguages: 'en',
                        layout: iframeWin.google.translate.TranslateElement.InlineLayout.SIMPLE,
                        autoDisplay: true
                    }, 'google_translate_element');
                    
                    setTimeout(() => {
                        hideGoogleTranslateElements(iframeDoc);
                        removeAllLanguageButtons(iframeDoc);
                        triggerTranslateToEnglish();
                    }, 300);
                }
            };
            
            const script = iframeDoc.createElement('script');
            script.id = 'google-translate-script';
            script.src = 'https://translate.google.com/translate_a/element.js?cb=setupGoogleTranslate';
            script.async = true;
            iframeDoc.head.appendChild(script);
            
            const translateDiv = iframeDoc.createElement('div');
            translateDiv.id = 'google_translate_element';
            translateDiv.style.position = 'absolute';
            translateDiv.style.visibility = 'hidden';
            translateDiv.style.width = '0';
            translateDiv.style.height = '0';
            iframeDoc.body.appendChild(translateDiv);
            
            const style = iframeDoc.createElement('style');
            style.textContent = `
                .goog-te-banner-frame, .goog-te-menu-frame, .goog-te-ftab-frame,
                .goog-te-gadget-simple, .goog-te-spinner-pos, .goog-te-balloon-frame,
                .skiptranslate, .goog-te-gadget, #google_translate_element,
                .goog-te-banner { display: none !important; }
                body { top: 0px !important; position: relative !important; }
            `;
            iframeDoc.head.appendChild(style);
            
        } catch(e) {
            console.error('Inject error:', e);
            setTimeout(injectTranslateToIframe, 500);
        }
    }
    
    // Xử lý nút EN (giữ nguyên)
    function handleEnClick() {
        const btnVi = document.getElementById('btnVi');
        const btnEn = document.getElementById('btnEn');
        
        btnEn.classList.add('active');
        btnVi.classList.remove('active');
        
        setTimeout(() => {
            try {
                const iframe = document.getElementById('contentFrame');
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const select = iframeDoc.querySelector('.goog-te-combo');
                if (select && select.value !== 'en') {
                    select.value = 'en';
                    select.dispatchEvent(new Event('change'));
                }
                removeAllLanguageButtons(iframeDoc);
            } catch(e) {}
        }, 200);
    }
    
    // Xử lý nút VI (giữ nguyên)
    function handleViClick() {
        window.location.href = targetUrl;
    }
    
    // Khởi tạo
    async function init() {
        targetUrl = localStorage.getItem('pendingTranslateUrl') || './index.html';
        
        const btnVi = document.getElementById('btnVi');
        const btnEn = document.getElementById('btnEn');
        
        btnVi.onclick = handleViClick;
        btnEn.onclick = handleEnClick;
        
        // Load trang
        await loadCleanedContent();
        
        // Xóa localStorage sau khi load xong
        setTimeout(() => {
            localStorage.removeItem('pendingTranslateUrl');
        }, 1000);
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</body>
</html>
