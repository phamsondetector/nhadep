<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NhàĐẹp.vn - English Version</title>
    <meta name="robots" content="noindex, nofollow">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Open Sans', system-ui, sans-serif;
            background: #0A0A0A;
            color: #F5F5F5;
            overflow: hidden;
        }
        
        .iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: #0A0A0A;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0A0A0A;
        }
        
        .lang-buttons {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 0px;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 4px;
            border: 1px solid rgba(198,164,59,0.3);
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .lang-btn {
            background: none;
            border: none;
            color: #9C9C9C;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 8px 18px;
            border-radius: 30px;
            transition: all 0.2s;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            margin: 0;
        }
        
        .lang-btn.active {
            background: rgba(198,164,59,0.25);
            color: #C6A43B;
        }
        
        .lang-btn:hover {
            background: rgba(198,164,59,0.15);
            color: #C6A43B;
        }
        
        .goog-te-banner-frame,
        .goog-te-menu-frame,
        .goog-te-ftab-frame,
        .goog-te-gadget-simple,
        .goog-te-spinner-pos,
        .goog-te-balloon-frame,
        .skiptranslate,
        .goog-te-gadget,
        #google_translate_element,
        .goog-te-banner {
            display: none !important;
        }
        
        body {
            top: 0px !important;
            position: relative !important;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(198,164,59,0.2);
            border-top-color: #C6A43B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #C6A43B;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        
        @media (max-width: 768px) {
            .lang-buttons {
                bottom: 16px;
                right: 16px;
                padding: 3px;
            }
            .lang-btn {
                padding: 5px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading English version...</div>
</div>

<div class="iframe-container">
    <iframe id="contentFrame" src="about:blank"></iframe>
</div>

<div class="lang-buttons">
    <button class="lang-btn" id="btnVi">🇻🇳 VI</button>
    <button class="lang-btn active" id="btnEn">🇬🇧 EN</button>
</div>

<script>
    let targetUrl = '';
    let isFirstLoad = true;
    
    // Hàm sửa tất cả link về trang chủ trong iframe
    function fixHomeLinksInIframe(iframeDoc) {
        if (!iframeDoc) return;
        
        // Sửa tất cả link có href
        const allLinks = iframeDoc.querySelectorAll('a[href]');
        allLinks.forEach(link => {
            const href = link.getAttribute('href') || '';
            
            // Nếu link trỏ về entrans.html, sửa thành /
            if (href === './entrans.html' || 
                href === '../entrans.html' || 
                href === 'entrans.html' ||
                href.includes('entrans.html')) {
                link.setAttribute('href', '/');
            }
            
            // Sửa link "Về trang chủ" hoặc "Back to home"
            const linkText = link.textContent || '';
            if (linkText.includes('Về trang chủ') || 
                linkText.includes('Back to home') ||
                linkText.includes('← Về trang chủ') ||
                linkText.includes('← Quay lại trang chủ')) {
                link.setAttribute('href', '/');
            }
            
            // Sửa link có class back-btn
            if (link.classList && link.classList.contains('back-btn')) {
                link.setAttribute('href', '/');
            }
        });
        
        // Sửa tất cả các nút có onclick
        const allElements = iframeDoc.querySelectorAll('[onclick]');
        allElements.forEach(el => {
            const onclick = el.getAttribute('onclick') || '';
            if (onclick.includes('window.location') || onclick.includes('location.href')) {
                let newOnclick = onclick
                    .replace(/(\.\/|\.\.\/)?entrans\.html/g, '/')
                    .replace(/['"]\.\/index\.html['"]/g, "'/'")
                    .replace(/['"]\.\.\/index\.html['"]/g, "'/'");
                el.setAttribute('onclick', newOnclick);
            }
        });
    }
    
    function removeAllLanguageButtons(doc) {
        if (!doc) return;
        const selectorsToRemove = [
            '.lang-switch', '.lang-nav-btn', '.lang-tag-btn', '.lang-btn',
            '.lang-buttons', '.translate-toolbar', '[onclick*="switchLanguage"]', '.lang-en-switch'
        ];
        selectorsToRemove.forEach(selector => {
            const elements = doc.querySelectorAll(selector);
            elements.forEach(el => { if (el) el.remove(); });
        });
        const allElements = doc.querySelectorAll('button, a, div');
        allElements.forEach(el => {
            const text = el.textContent || '';
            if ((text.includes('VI') || text.includes('EN') || text.includes('🇻🇳') || text.includes('🇬🇧')) && 
                (el.tagName === 'BUTTON' || el.classList.contains('lang-btn') || el.classList.contains('lang-nav-btn'))) {
                el.remove();
            }
        });
    }
    
    function triggerTranslateToEnglish() {
        try {
            const iframe = document.getElementById('contentFrame');
            if (!iframe || !iframe.contentWindow || !iframe.contentDocument) {
                setTimeout(triggerTranslateToEnglish, 300);
                return;
            }
            const iframeDoc = iframe.contentDocument;
            const select = iframeDoc.querySelector('.goog-te-combo');
            if (select && select.value !== 'en') {
                select.value = 'en';
                select.dispatchEvent(new Event('change'));
                setTimeout(() => {
                    hideGoogleTranslateElements(iframeDoc);
                    removeAllLanguageButtons(iframeDoc);
                    fixHomeLinksInIframe(iframeDoc); // SỬA LINK VỀ TRANG CHỦ
                }, 500);
            } else if (!select) {
                setTimeout(triggerTranslateToEnglish, 300);
            }
        } catch(e) {
            setTimeout(triggerTranslateToEnglish, 300);
        }
    }
    
    function hideGoogleTranslateElements(doc) {
        if (!doc) return;
        const hideSelectors = [
            '.goog-te-banner-frame', '.goog-te-menu-frame', '.goog-te-ftab-frame',
            '.goog-te-gadget-simple', '.goog-te-spinner-pos', '.goog-te-balloon-frame',
            '.skiptranslate', '.goog-te-gadget', '#google_translate_element', '.goog-te-banner'
        ];
        hideSelectors.forEach(selector => {
            const elements = doc.querySelectorAll(selector);
            elements.forEach(el => { if (el) el.style.display = 'none'; });
        });
        if (doc.body) {
            doc.body.style.top = '0px';
            doc.body.style.position = 'relative';
        }
    }
    
    async function fetchAndCleanContent(url) {
        try {
            const response = await fetch(url);
            let html = await response.text();
            html = html.replace(/<div[^>]*class="[^"]*lang-switch[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*lang-buttons[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<button[^>]*class="[^"]*lang-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '');
            html = html.replace(/<button[^>]*class="[^"]*lang-nav-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*translate-toolbar[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/<div[^>]*class="[^"]*lang-en-switch[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            html = html.replace(/function switchLanguage[^{]*\{[\s\S]*?\}/gi, '');
            html = html.replace(/switchLanguage\s*\([^)]*\)/gi, '');
            return html;
        } catch(e) {
            console.error('Fetch error:', e);
            return null;
        }
    }
    
    async function loadCleanedContent() {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.display = 'flex';
        const cleanedHtml = await fetchAndCleanContent(targetUrl);
        if (!cleanedHtml) {
            const iframe = document.getElementById('contentFrame');
            iframe.src = targetUrl;
            iframe.onload = function() {
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                    if (isFirstLoad) {
                        isFirstLoad = false;
                        setTimeout(() => {
                            try {
                                const iframeDoc = iframe.contentDocument;
                                removeAllLanguageButtons(iframeDoc);
                                injectTranslateToIframe();
                            } catch(e) {}
                        }, 500);
                    }
                }, 800);
            };
            return;
        }
        const iframe = document.getElementById('contentFrame');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(cleanedHtml);
        iframeDoc.close();
        setTimeout(() => {
            loadingOverlay.style.display = 'none';
            if (isFirstLoad) {
                isFirstLoad = false;
                removeAllLanguageButtons(iframeDoc);
                injectTranslateToIframe();
            }
        }, 800);
    }
    
    function injectTranslateToIframe() {
        try {
            const iframe = document.getElementById('contentFrame');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            const iframeWin = iframe.contentWindow;
            if (iframeDoc.querySelector('#google-translate-script')) {
                triggerTranslateToEnglish();
                return;
            }
            iframeWin.setupGoogleTranslate = function() {
                if (iframeWin.google && iframeWin.google.translate) {
                    new iframeWin.google.translate.TranslateElement({
                        pageLanguage: 'vi',
                        includedLanguages: 'en',
                        layout: iframeWin.google.translate.TranslateElement.InlineLayout.SIMPLE,
                        autoDisplay: true
                    }, 'google_translate_element');
                    setTimeout(() => {
                        hideGoogleTranslateElements(iframeDoc);
                        removeAllLanguageButtons(iframeDoc);
                        triggerTranslateToEnglish();
                    }, 300);
                }
            };
            const script = iframeDoc.createElement('script');
            script.id = 'google-translate-script';
            script.src = 'https://translate.google.com/translate_a/element.js?cb=setupGoogleTranslate';
            script.async = true;
            iframeDoc.head.appendChild(script);
            const translateDiv = iframeDoc.createElement('div');
            translateDiv.id = 'google_translate_element';
            translateDiv.style.position = 'absolute';
            translateDiv.style.visibility = 'hidden';
            translateDiv.style.width = '0';
            translateDiv.style.height = '0';
            iframeDoc.body.appendChild(translateDiv);
            const style = iframeDoc.createElement('style');
            style.textContent = `
                .goog-te-banner-frame, .goog-te-menu-frame, .goog-te-ftab-frame,
                .goog-te-gadget-simple, .goog-te-spinner-pos, .goog-te-balloon-frame,
                .skiptranslate, .goog-te-gadget, #google_translate_element,
                .goog-te-banner { display: none !important; }
                body { top: 0px !important; position: relative !important; }
            `;
            iframeDoc.head.appendChild(style);
        } catch(e) {
            console.error('Inject error:', e);
            setTimeout(injectTranslateToIframe, 500);
        }
    }
    
    function handleEnClick() {
        const btnVi = document.getElementById('btnVi');
        const btnEn = document.getElementById('btnEn');
        btnEn.classList.add('active');
        btnVi.classList.remove('active');
        setTimeout(() => {
            try {
                const iframe = document.getElementById('contentFrame');
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const select = iframeDoc.querySelector('.goog-te-combo');
                if (select && select.value !== 'en') {
                    select.value = 'en';
                    select.dispatchEvent(new Event('change'));
                }
                removeAllLanguageButtons(iframeDoc);
                fixHomeLinksInIframe(iframeDoc);
            } catch(e) {}
        }, 200);
    }
    
    function handleViClick() {
        window.location.href = targetUrl;
    }
    
    async function init() {
        targetUrl = localStorage.getItem('pendingTranslateUrl') || '/';
        const btnVi = document.getElementById('btnVi');
        const btnEn = document.getElementById('btnEn');
        btnVi.onclick = handleViClick;
        btnEn.onclick = handleEnClick;
        await loadCleanedContent();
        setTimeout(() => { localStorage.removeItem('pendingTranslateUrl'); }, 1000);
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</body>
</html>
