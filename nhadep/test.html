<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>test — NhàĐẹp.vn</title>
<meta name="description" content="test">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B51EJTDD2L"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-B51EJTDD2L');

<style>
        :root{--bg:#0A0A0A;--gold:#C6A43B;--gold2:#D4AF37;--text:#F5F5F5;--muted:#9C9C9C;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
        nav{background:rgba(10,10,10,.95);border-bottom:1px solid rgba(198,164,59,.2);padding:16px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
        nav h1{font-family:'Playfair Display',serif;font-size:1.3rem;}
        nav h1 span{color:var(--gold);}
        nav a{color:var(--muted);text-decoration:none;}
        nav a:hover{color:var(--gold);}
        .container{max-width:1200px;margin:0 auto;padding:48px 24px;}
        .meta{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;}
        .tag{background:rgba(198,164,59,.2);color:var(--gold2);padding:6px 16px;border-radius:30px;font-size:.75rem;}
        .date{color:var(--muted);font-size:.85rem;line-height:2;}
        .content{line-height:1.8;font-size:1.05rem;}
        .content h2{font-family:'Playfair Display',serif;font-size:1.8rem;margin:40px 0 20px;color:var(--gold);}
        .content h3{font-family:'Playfair Display',serif;font-size:1.4rem;margin:30px 0 15px;}
        .content p{margin-bottom:24px;}
        .content img{max-width:100%;border-radius:16px;margin:30px 0;display:block;height:auto;}
        .content blockquote{border-left:4px solid var(--gold);padding-left:24px;margin:24px 0;color:var(--muted);font-style:italic;}
        .content ul,.content ol{margin:20px 0 20px 32px;}
        .content li{margin:10px 0;}
        .back-btn{display:inline-block;margin-top:48px;padding:12px 32px;background:var(--gold);color:#0A0A0A;text-decoration:none;border-radius:40px;font-weight:600;transition:all .2s;}
        .back-btn:hover{transform:translateY(-2px);background:#D4AF37;}
        @media (max-width:768px){nav{padding:12px 20px;}nav h1{font-size:1.1rem;}.container{padding:32px 20px;}.content h2{font-size:1.5rem;}.content h3{font-size:1.2rem;}}
    </style>
</head>
<body>
<nav><h1><img src="../logo.webp" alt="Logo" style="height:32px;width:32px;object-fit:cover;border-radius:7px;vertical-align:middle;margin-right:7px;" onerror="this.style.display='none'"> Nhà<span>Đẹp</span></h1><a href="../index.html">← Về trang chủ</a></nav>
<div class="container">
  <div class="meta"><span class="tag">Hiện đại</span><span class="date">1/4/2026</span></div>
  <div class="content"></div>
  
    <div id="related-posts-container" style="margin-top: 60px; padding-top: 40px; border-top: 2px solid var(--gold);">
        <h3 style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 30px; color: var(--gold); text-align: left;">
            <i class="fa-regular fa-star" style="margin-right: 12px;"></i> Có thể bạn sẽ thích
        </h3>
        <div id="related-posts-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px;">
            <div style="text-align: center; padding: 40px; color: var(--muted); grid-column: 1 / -1;">
                <i class="fa-solid fa-spinner fa-spin"></i> Đang tải bài viết liên quan...
            </div>
        </div>
    </div>
    <style>
        .related-card {
            text-decoration: none;
            display: block;
            background: rgba(255,255,255,.03);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(198,164,59,.2);
        }
        .related-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .related-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }
        .related-card .card-content {
            padding: 12px;
        }
        .related-card .card-tag {
            font-size: 0.65rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .related-card .card-title {
            font-size: 0.85rem;
            margin-top: 6px;
            color: var(--text);
            line-height: 1.4;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .related-card .card-summary {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .related-card .read-more {
            margin-top: 10px;
            color: var(--gold);
            font-size: 0.7rem;
            display: inline-block;
        }
        @media (max-width: 1200px) {
            #related-posts-grid { grid-template-columns: repeat(4, 1fr) !important; }
        }
        @media (max-width: 992px) {
            #related-posts-grid { grid-template-columns: repeat(3, 1fr) !important; }
        }
        @media (max-width: 768px) {
            #related-posts-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .related-card img { height: 120px; }
        }
        @media (max-width: 480px) {
            #related-posts-grid { grid-template-columns: 1fr !important; }
        }
    </style>
    <script>
        // Hàm lấy đường dẫn đến data.json (tự động xác định vị trí)
        function getDataJsonPath() {
            var currentPath = window.location.pathname;
            var pathParts = currentPath.split('/').filter(function(p) { 
                return p && !p.includes('.html'); 
            });
            var depth = pathParts.length;
            var prefix = '';
            for (var i = 0; i < depth; i++) {
                prefix += '../';
            }
            if (prefix === '') prefix = './';
            return prefix + 'data.json';
        }
        
        // Hàm lấy bài viết liên quan từ data.json
        async function loadRelatedPosts() {
            var grid = document.getElementById('related-posts-grid');
            
            try {
                var currentSlug = 'test';
                var currentType = 'nhadep';
                var dataJsonPath = getDataJsonPath();
                
                console.log('🔍 Đang tải data.json từ:', dataJsonPath);
                
                var response = await fetch(dataJsonPath + '?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ': ' + response.statusText);
                }
                
                var articles = await response.json();
                console.log('✅ Đã tải', articles.length, 'bài viết từ data.json');
                
                // Lọc bài đã đăng (status = posted)
                var postedArticles = articles.filter(function(a) {
                    var status = (a.Status || a.status || '').toLowerCase();
                    return status === 'posted';
                });
                console.log('📌 Bài đã đăng:', postedArticles.length, 'bài');
                
                // Lọc bỏ bài hiện tại
                var filtered = postedArticles.filter(function(a) {
                    if (!a.url) return false;
                    var urlSlug = a.url.split('/').pop().replace('.html', '');
                    try {
                        urlSlug = decodeURIComponent(urlSlug);
                    } catch(e) {}
                    return urlSlug !== currentSlug;
                });
                console.log('🔍 Sau khi lọc bỏ bài hiện tại:', filtered.length, 'bài');
                
                // Ưu tiên bài cùng loại (kind)
                if (currentType && filtered.length > 0) {
                    var sameKind = filtered.filter(function(a) {
                        var articleKind = a.kind || '';
                        return articleKind.toLowerCase() === currentType.toLowerCase();
                    });
                    if (sameKind.length > 0) {
                        filtered = sameKind;
                        console.log('🎯 Ưu tiên bài cùng loại "' + currentType + '":', filtered.length, 'bài');
                    }
                }
                
                // Trộn ngẫu nhiên và lấy tối đa 5 bài
                for (var i = filtered.length - 1; i > 0; i--) {
                    var j = Math.floor(Math.random() * (i + 1));
                    var temp = filtered[i];
                    filtered[i] = filtered[j];
                    filtered[j] = temp;
                }
                var relatedArticles = filtered.slice(0, 5);
                console.log('✨ Kết quả:', relatedArticles.length, 'bài viết liên quan');
                
                if (relatedArticles.length === 0) {
                    grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--muted); grid-column: 1 / -1;">📭 Chưa có bài viết liên quan</div>';
                    return;
                }
                
                // Tạo HTML cho các card
                var html = '';
                for (var k = 0; k < relatedArticles.length; k++) {
                    var article = relatedArticles[k];
                    var articleTitle = article.title || '';
                    var articleSummary = article.summary || '';
                    var rawUrl = article.url || '#';
                    // Lấy url gốc, bỏ đi "./" ở đầu
                    var finalUrl = rawUrl.replace(/^.//, '');
                    var articleTag = article.tag || 'Bài viết';
                    var articleKind = article.kind || currentType;
                    
                    // Lấy slug từ url để tạo đường dẫn thumbnail
                    var articleSlug = rawUrl.split('/').pop().replace('.html', '');
                    try {
                        articleSlug = decodeURIComponent(articleSlug);
                    } catch(e) {}
                    
                    // Xác định đường dẫn thumbnail
                    var currentDepth = window.location.pathname.split('/').filter(function(p) { 
                        return p && !p.includes('.html'); 
                    }).length;
                    var prefix = '';
                    for (var d = 0; d < currentDepth; d++) {
                        prefix += '../';
                    }
                    if (prefix === '') prefix = './';
                    
                    var thumbnailPath = prefix + 'thumbnail/' + articleKind + '/' + encodeURIComponent(articleSlug) + '.webp';
                    var shortSummary = articleSummary.substring(0, 80);
                    
                    html += `
                        <a href="${finalUrl}" class="related-card">
                            <img src="${thumbnailPath}" alt="${escapeHtml(articleTitle)}" loading="lazy" onerror="this.style.display='none'">
                            <div class="card-content">
                                <span class="card-tag">${escapeHtml(articleTag)}</span>
                                <h4 class="card-title">${escapeHtml(articleTitle)}</h4>
                                ${shortSummary ? `<p class="card-summary">${escapeHtml(shortSummary)}${shortSummary.length >= 80 ? '...' : ''}</p>` : ''}
                                <div class="read-more">
                                    Đọc tiếp <i class="fa-solid fa-arrow-right"></i>
                                </div>
                            </div>
                        </a>
                    `;
                }
                
                grid.innerHTML = html;
                console.log('✅ Đã hiển thị', relatedArticles.length, 'card bài viết liên quan');
                
            } catch (error) {
                console.error('❌ Lỗi tải bài viết liên quan:', error);
                grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--red); grid-column: 1 / -1;">⚠️ Không thể tải bài viết liên quan<br><small style="color: var(--dim);">' + error.message + '</small><br><button onclick="location.reload()" style="margin-top: 10px; padding: 8px 16px; background: var(--gold); color: #000; border: none; border-radius: 8px; cursor: pointer;">🔄 Thử lại</button></div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Tải bài viết liên quan khi trang load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadRelatedPosts);
        } else {
            loadRelatedPosts();
        }
    </script>
    
  <div style="text-align: center; margin-top: 40px;">
    <a href="../index.html" class="back-btn">← Quay lại trang chủ</a>
  </div>
</div>
</body>
</html>
