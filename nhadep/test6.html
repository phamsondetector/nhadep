<style>
        :root{--bg:#0A0A0A;--gold:#C6A43B;--gold2:#D4AF37;--text:#F5F5F5;--muted:#9C9C9C;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
        nav{background:rgba(10,10,10,.95);border-bottom:1px solid rgba(198,164,59,.2);padding:16px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
        nav h1{font-family:'Playfair Display',serif;font-size:1.3rem;}
        nav h1 span{color:var(--gold);}
        nav a{color:var(--muted);text-decoration:none;}
        nav a:hover{color:var(--gold);}
        .container{max-width:1200px;margin:0 auto;padding:48px 24px;}
        .meta{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;}
        .tag{background:rgba(198,164,59,.2);color:var(--gold2);padding:6px 16px;border-radius:30px;font-size:.75rem;}
        .date{color:var(--muted);font-size:.85rem;line-height:2;}
        .content{line-height:1.8;font-size:1.05rem;}
        .content h2{font-family:'Playfair Display',serif;font-size:1.8rem;margin:40px 0 20px;color:var(--gold);}
        .content h3{font-family:'Playfair Display',serif;font-size:1.4rem;margin:30px 0 15px;}
        .content p{margin-bottom:24px;}
        .content img{max-width:100%;border-radius:16px;margin:30px 0;display:block;height:auto;}
        .content blockquote{border-left:4px solid var(--gold);padding-left:24px;margin:24px 0;color:var(--muted);font-style:italic;}
        .content ul,.content ol{margin:20px 0 20px 32px;}
        .content li{margin:10px 0;}
        .back-btn{display:inline-block;margin-top:48px;padding:12px 32px;background:var(--gold);color:#0A0A0A;text-decoration:none;border-radius:40px;font-weight:600;transition:all .2s;}
        .back-btn:hover{transform:translateY(-2px);background:#D4AF37;}
        .content-tag {
            display: inline-block;
            background: rgba(198,164,59,.15);
            color: var(--gold);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin: 0 2px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(198,164,59,.3);
            text-decoration: none;
        }
        .content-tag:hover {
            background: rgba(198,164,59,.3);
            transform: translateY(-1px);
        }
        @media (max-width:768px){nav{padding:12px 20px;}nav h1{font-size:1.1rem;}.container{padding:32px 20px;}.content h2{font-size:1.5rem;}.content h3{font-size:1.2rem;}}
    </style>

<body>
<nav><h1><img src="../logo.webp" alt="Logo" style="height:32px;width:32px;object-fit:cover;border-radius:7px;vertical-align:middle;margin-right:7px;" onerror="this.style.display='none'"> Nhà<span>Đẹp</span></h1><a href="../index.html">← Về trang chủ</a></nav>
<div class="container">
  <div class="meta"><span class="tag">Hiện đại</span><span class="date">2/4/2026</span></div>
  <div class="content"></div>
  
    <div id="related-posts-container" style="margin-top: 60px; padding-top: 40px; border-top: 2px solid var(--gold);">
        <h3 style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 30px; color: var(--gold); text-align: left;">
            <i class="fa-regular fa-star" style="margin-right: 12px;"></i> Có thể bạn sẽ thích
        </h3>
        <div id="related-posts-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px;">
            <div style="text-align: center; padding: 40px; color: var(--muted); grid-column: 1 / -1;">
                <i class="fa-solid fa-spinner fa-spin"></i> Đang tải bài viết liên quan...
            </div>
        </div>
    </div>
    <style>
        .related-card {
            text-decoration: none;
            display: block;
            background: rgba(255,255,255,.03);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(198,164,59,.2);
        }
        .related-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .related-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }
        .related-card .card-content {
            padding: 12px;
        }
        .related-card .card-tag {
            font-size: 0.65rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .related-card .card-title {
            font-size: 0.85rem;
            margin-top: 6px;
            color: var(--text);
            line-height: 1.4;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .related-card .card-summary {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .related-card .read-more {
            margin-top: 10px;
            color: var(--gold);
            font-size: 0.7rem;
            display: inline-block;
        }
        .content-tag {
            display: inline-block;
            background: rgba(198,164,59,.15);
            color: var(--gold);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin: 0 2px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(198,164,59,.3);
            text-decoration: none;
        }
        .content-tag:hover {
            background: rgba(198,164,59,.3);
            transform: translateY(-1px);
        }
        .tag-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .tag-modal.active {
            display: flex;
        }
        .tag-modal-content {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .tag-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tag-modal-header h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
        }
        .tag-modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .tag-modal-close:hover {
            color: var(--gold);
        }
        .tag-modal-list {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
        }
        .tag-post-item {
            display: block;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: var(--mid);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        .tag-post-item:hover {
            border-color: var(--gold);
            transform: translateX(4px);
            background: rgba(198,164,59,.1);
        }
        .tag-post-item .post-title {
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag-post-item .post-date {
            font-size: 0.7rem;
            color: var(--dim);
        }
        .tag-post-item .post-summary {
            font-size: 0.75rem;
            color: var(--muted);
            line-height: 1.4;
        }
        .tag-post-item .post-tags {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag-post-item .mini-tag {
            font-size: 0.6rem;
            background: rgba(198,164,59,.1);
            padding: 2px 8px;
            border-radius: 12px;
            color: var(--gold);
        }
        .no-posts {
            text-align: center;
            padding: 40px;
            color: var(--dim);
        }
        @media (max-width: 1200px) {
            #related-posts-grid { grid-template-columns: repeat(4, 1fr) !important; }
        }
        @media (max-width: 992px) {
            #related-posts-grid { grid-template-columns: repeat(3, 1fr) !important; }
        }
        @media (max-width: 768px) {
            #related-posts-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .related-card img { height: 120px; }
        }
        @media (max-width: 480px) {
            #related-posts-grid { grid-template-columns: 1fr !important; }
        }
    </style>
    <script>
        function getDataJsonPath() {
            var currentPath = window.location.pathname;
            var pathParts = currentPath.split('/').filter(function(p) { return p && !p.includes('.html'); });
            var depth = pathParts.length;
            var prefix = '';
            for (var i = 0; i < depth; i++) {
                prefix += '../';
            }
            if (prefix === '') prefix = './';
            return prefix + 'data.json';
        }
        
        async function showPostsByTag(tagName) {
            var modal = document.getElementById('tag-modal');
            var modalTagName = document.getElementById('modal-tag-name');
            var modalList = document.getElementById('tag-modal-list');
            
            if (!modal) return;
            
            modalTagName.textContent = tagName;
            modalList.innerHTML = '<div class="no-posts"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải bài viết...</div>';
            modal.classList.add('active');
            
            try {
                var dataJsonPath = getDataJsonPath();
                var response = await fetch(dataJsonPath + '?t=' + Date.now());
                if (!response.ok) throw new Error('Không thể tải dữ liệu');
                var articles = await response.json();
                
                var relatedPosts = articles.filter(function(article) {
                    if (!article.tag) return false;
                    var tags = article.tag.split(',').map(function(t) { return t.trim(); });
                    return tags.includes(tagName) && article.Status === 'posted';
                });
                
                if (relatedPosts.length === 0) {
                    modalList.innerHTML = '<div class="no-posts"><i class="fa-regular fa-folder-open"></i><p>Chưa có bài viết nào với tag "' + escapeHtml(tagName) + '"</p></div>';
                    return;
                }
                
                var html = '';
                for (var i = 0; i < relatedPosts.length; i++) {
                    var post = relatedPosts[i];
                    var postUrl = post.url || '#';
                    var postDate = post.date || '';
                    var postSummary = post.summary || '';
                    var postTags = post.tag ? post.tag.split(',').map(function(t) { return t.trim(); }) : [];
                    
                    html += '<a href="' + postUrl + '" class="tag-post-item" target="_blank">' +
                        '<div class="post-title">' +
                            '<span>' + escapeHtml(post.title) + '</span>' +
                            '<span class="post-date">' + postDate + '</span>' +
                        '</div>';
                    if (postSummary) {
                        html += '<div class="post-summary">' + escapeHtml(postSummary.substring(0, 120)) + (postSummary.length > 120 ? '...' : '') + '</div>';
                    }
                    html += '<div class="post-tags">';
                    for (var j = 0; j < postTags.length; j++) {
                        html += '<span class="mini-tag">#' + escapeHtml(postTags[j]) + '</span>';
                    }
                    html += '</div></a>';
                }
                modalList.innerHTML = html;
            } catch (error) {
                console.error('Lỗi khi tải bài viết:', error);
                modalList.innerHTML = '<div class="no-posts"><i class="fa-regular fa-circle-xmark"></i><p>Không thể tải danh sách bài viết</p></div>';
            }
        }
        
        function closeTagModal() {
            var modal = document.getElementById('tag-modal');
            if (modal) modal.classList.remove('active');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeTagModal();
        });
        
        async function loadRelatedPosts() {
            try {
                var currentSlug = 'test6';
                var currentType = 'nhadep';
                var dataJsonPath = getDataJsonPath();
                
                var response = await fetch(dataJsonPath + '?t=' + Date.now());
                if (!response.ok) throw new Error('Không thể tải data.json');
                
                var articles = await response.json();
                var postedArticles = articles.filter(function(a) {
                    var status = (a.Status || a.status || '').toLowerCase();
                    return status === 'posted';
                });
                
                var filtered = postedArticles.filter(function(a) {
                    if (!a.relatedlink) return false;
                    var relatedSlug = a.relatedlink.replace('./', '').replace('.html', '');
                    try { relatedSlug = decodeURIComponent(relatedSlug); } catch(e) {}
                    var articleKind = a.kind || '';
                    if (relatedSlug === currentSlug && articleKind === currentType) return false;
                    return true;
                });
                
                for (var i = filtered.length - 1; i > 0; i--) {
                    var j = Math.floor(Math.random() * (i + 1));
                    var temp = filtered[i];
                    filtered[i] = filtered[j];
                    filtered[j] = temp;
                }
                var relatedArticles = filtered.slice(0, 5);
                var grid = document.getElementById('related-posts-grid');
                
                if (relatedArticles.length === 0) {
                    grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--muted); grid-column: 1 / -1;">Chưa có bài viết liên quan</div>';
                    return;
                }
                
                var currentDepth = window.location.pathname.split('/').filter(function(p) { return p && !p.includes('.html'); }).length;
                var backPath = '';
                for (var d = 0; d < currentDepth; d++) backPath += '../';
                if (backPath === '') backPath = './';
                
                var html = '';
                for (var k = 0; k < relatedArticles.length; k++) {
                    var article = relatedArticles[k];
                    var articleTitle = article.title || '';
                    var articleSummary = article.summary || '';
                    var articleKind = article.kind || 'nhadep';
                    var articleRelLink = article.relatedlink || '';
                    var articleSlug = articleRelLink.replace('./', '').replace('.html', '');
                    try { articleSlug = decodeURIComponent(articleSlug); } catch(e) {}
                    var articleUrl = backPath + articleKind + '/' + encodeURIComponent(articleSlug) + '.html';
                    var articleTag = article.tag || 'Bài viết';
                    if (articleTag && articleTag.includes(',')) articleTag = articleTag.split(',')[0].trim();
                    var thumbnailPath = backPath + 'thumbnail/' + articleKind + '/' + encodeURIComponent(articleSlug) + '.webp';
                    var shortSummary = (articleSummary || '').substring(0, 80);
                    html += '<a href="' + articleUrl + '" class="related-card">' +
                        '<img src="' + thumbnailPath + '" alt="' + escapeHtml(articleTitle) + '" loading="lazy" onerror="this.style.display='none'">' +
                        '<div class="card-content">' +
                            '<span class="card-tag">' + escapeHtml(articleTag) + '</span>' +
                            '<h4 class="card-title">' + escapeHtml(articleTitle) + '</h4>';
                    if (shortSummary) html += '<p class="card-summary">' + escapeHtml(shortSummary) + (shortSummary.length >= 80 ? '...' : '') + '</p>';
                    html += '<div class="read-more">Đọc tiếp <i class="fa-solid fa-arrow-right"></i></div></div></a>';
                }
                grid.innerHTML = html;
            } catch (error) {
                console.error('Lỗi:', error);
                var grid = document.getElementById('related-posts-grid');
                if (grid) grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--muted); grid-column: 1 / -1;">Không thể tải bài viết liên quan</div>';
            }
        }
        
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', loadRelatedPosts);
        else loadRelatedPosts();
    </script>
    
  <div style="text-align: center; margin-top: 40px;">
    <a href="../index.html" class="back-btn">← Quay lại trang chủ</a>
  </div>
</div>
