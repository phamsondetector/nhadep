<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>english — NhaDep.vn</title>
<meta name="description" content="english">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
:root{--bg:#0A0A0A;--gold:#C6A43B;--text:#F5F5F5;--muted:#9C9C9C;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
nav{background:rgba(10,10,10,.95);border-bottom:1px solid rgba(198,164,59,.2);padding:16px 32px;display:flex;justify-content:space-between;}
nav h1{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);}
.container{max-width:1200px;margin:0 auto;padding:48px 24px;}
.meta{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;}
.tag{background:rgba(198,164,59,.2);color:var(--gold);padding:6px 16px;border-radius:30px;text-decoration:none;font-size:.75rem;}
.content h2{font-size:1.8rem;margin:40px 0 20px;color:var(--gold);}
.content img{max-width:80%;height:auto;border-radius:16px;margin:30px auto;display:block;}
.back-btn{display:inline-block;margin-top:48px;padding:12px 32px;background:var(--gold);color:#0A0A0A;text-decoration:none;border-radius:40px;}
@media (max-width:768px){.container{padding:32px 20px;}}
</style>
</head>
<body>
<nav><h1>NhàĐẹp</h1><a href="../../index.html">← Back home</a></nav>
<div class="container">
  <div class="meta"><a class="tag" href="../../tag.html?tag=Hi%E1%BB%87n%20%C4%91%E1%BA%A1i">Hiện đại</a><span style="color:var(--muted);">4/4/2026</span></div>
  <div class="content">english<div><span style="background-color: rgba(198, 164, 59, 0.2); padding: 2px 6px; border-radius: 4px; font-family: monospace;">../../images/nhadep/test1/image_1.webp</span><br></div></div>
  
    <div id="related-posts-container" style="margin-top: 60px; padding-top: 40px; border-top: 2px solid var(--gold);">
        <h3 style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 30px; color: var(--gold);">📖 You might also like</h3>
        <div id="related-posts-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px;">
            <div style="text-align: center; padding: 40px; color: var(--muted); grid-column: 1 / -1;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </div>
    <style>.related-card { text-decoration: none; display: block; background: rgba(255,255,255,.03); border-radius: 16px; overflow: hidden; transition: all 0.3s; border: 1px solid rgba(198,164,59,.2); } .related-card:hover { transform: translateY(-5px); border-color: var(--gold); } .related-card img { width: 100%; height: 140px; object-fit: cover; } .related-card .card-content { padding: 12px; } .related-card .card-tag { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; } .related-card .card-title { font-size: 0.85rem; margin-top: 6px; color: var(--text); font-weight: 600; } @media (max-width: 768px) { #related-posts-grid { grid-template-columns: repeat(2,1fr) !important; } }</style>
    <script>
        async function loadRelatedPosts() {
            const currentSlug = 'test1';
            const currentType = 'nhadep';
            const lang = 'en';
            let dataJsonPath = '';
            const depth = window.location.pathname.split('/').filter(p => p && !p.includes('.html')).length;
            for(let i=0;i<depth;i++) dataJsonPath += '../';
            dataJsonPath += 'data.json';
            try {
                const resp = await fetch(dataJsonPath + '?t='+Date.now());
                const articles = await resp.json();
                let filtered = articles.filter(a => (a.Status||a.status||'').toLowerCase() === 'posted' && a.kind === currentType && !a.relatedlink.includes(currentSlug));
                filtered.sort(() => Math.random() - 0.5);
                const related = filtered.slice(0,5);
                const grid = document.getElementById('related-posts-grid');
                if(related.length===0) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;">No related posts</div>'; return; }
                let back = '';
                for(let i=0;i<depth;i++) back += '../';
                let html = '';
                related.forEach(a => {
                    let displayTitle = (lang === 'en' && a.title_en) ? a.title_en : a.title;
                    let baseFile = a.relatedlink.replace('./', '').replace('.html', '');
                    let targetFile = (lang === 'en') ? baseFile + '_en.html' : baseFile + '.html';
                    let link = back + a.kind + '/' + targetFile;
                    const relatedSlug = baseFile;
                    html += `<a href="${link}" class="related-card"><img src="${back}thumbnail/${a.kind}/${relatedSlug}.webp" onerror="this.style.display='none'"><div class="card-content"><span class="card-tag">${(a.tag||'').split(',')[0]}</span><div class="card-title">${escapeHtmlStatic(displayTitle)}</div></div></a>`;
                });
                grid.innerHTML = html;
            } catch(e) { console.error(e); }
        }
        function escapeHtmlStatic(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
        document.addEventListener('DOMContentLoaded', loadRelatedPosts);
    </script>
  
    <div style="display: flex; gap: 16px; justify-content: center; margin: 40px 0 20px;">
        <button id="langViBottom" style="background: none; border: 1px solid rgba(198,164,59,0.3); padding: 10px 28px; border-radius: 40px; cursor: pointer; font-weight: 600; color: #9C9C9C; transition: all 0.2s;">🇻🇳 Tiếng Việt</button>
        <button id="langEnBottom" style="background: none; border: 1px solid rgba(198,164,59,0.3); padding: 10px 28px; border-radius: 40px; cursor: pointer; font-weight: 600; color: #9C9C9C; transition: all 0.2s;">🇬🇧 English</button>
    </div>
    <script>
    function setupLanguageSwitch() {
        const viBtn = document.getElementById('langViBottom');
        const enBtn = document.getElementById('langEnBottom');
        const currentUrl = window.location.href;
        const currentPath = window.location.pathname;
        function switchToVi() {
            if (currentPath.includes('_en.html')) {
                let viUrl = currentUrl.replace('_en.html', '.html');
                window.location.href = viUrl;
            }
        }
        function switchToEn() {
            if (!currentPath.includes('_en.html')) {
                let enUrl = currentUrl.replace('.html', '_en.html');
                window.location.href = enUrl;
            }
        }
        viBtn.onclick = (e) => { e.preventDefault(); switchToVi(); };
        enBtn.onclick = (e) => { e.preventDefault(); switchToEn(); };
        if (currentPath.includes('_en.html')) {
            enBtn.style.background = 'rgba(198,164,59,0.25)';
            enBtn.style.color = '#C6A43B';
            viBtn.style.background = 'none';
            viBtn.style.color = '#9C9C9C';
        } else {
            viBtn.style.background = 'rgba(198,164,59,0.25)';
            viBtn.style.color = '#C6A43B';
            enBtn.style.background = 'none';
            enBtn.style.color = '#9C9C9C';
        }
    }
    window.loadData = window.loadData || function() {};
    window.initMobileMenu = window.initMobileMenu || function() {};
    window.initLazyLoading = window.initLazyLoading || function() {};
    window.toggleFilterDropdown = window.toggleFilterDropdown || function() {};
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof loadData === 'function') loadData();
        if (typeof initMobileMenu === 'function') initMobileMenu();
        setupLanguageSwitch();
        setTimeout(() => { if (typeof initLazyLoading === 'function') initLazyLoading(); }, 100);
    });
    </script>
  <div style="text-align:center;"><a href="../../index.html" class="back-btn">← Back to homepage</a></div>
</div>
</body>
</html>
