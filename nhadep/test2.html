<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes"><title>test2 — NhàĐẹp.vn</title>
<meta name="description" content="test2">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
:root{--bg:#0A0A0A;--gold:#C6A43B;--gold2:#D4AF37;--text:#F5F5F5;--muted:#9C9C9C;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
nav{background:rgba(10,10,10,.95);border-bottom:1px solid rgba(198,164,59,.2);padding:16px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
nav h1{font-family:'Playfair Display',serif;font-size:1.3rem;}
nav h1 span{color:var(--gold);}
nav a{color:var(--muted);text-decoration:none;}
nav a:hover{color:var(--gold);}
.container{max-width:1200px;margin:0 auto;padding:48px 24px;}
.meta{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;}
.tag{background:rgba(198,164,59,.2);color:var(--gold2);padding:6px 16px;border-radius:30px;font-size:.75rem;text-decoration:none;transition:background .2s,color .2s;}
.tag:hover{background:rgba(198,164,59,.4);color:#fff;}
.date{color:var(--muted);font-size:.85rem;line-height:2;}
.content{line-height:1.8;font-size:1.05rem;}
.content h2{font-family:'Playfair Display',serif;font-size:1.8rem;margin:40px 0 20px;color:var(--gold);}
.content h3{font-family:'Playfair Display',serif;font-size:1.4rem;margin:30px 0 15px;}
.content p{margin-bottom:24px;}
.content img{max-width:100%;border-radius:16px;margin:30px 0;display:block;height:auto;}
.back-btn{display:inline-block;margin-top:48px;padding:12px 32px;background:var(--gold);color:#0A0A0A;text-decoration:none;border-radius:40px;font-weight:600;transition:all .2s;}
.back-btn:hover{transform:translateY(-2px);background:#D4AF37;}
@media (max-width:768px){nav{padding:12px 20px;}nav h1{font-size:1.1rem;}.container{padding:32px 20px;}.content h2{font-size:1.5rem;}.content h3{font-size:1.2rem;}}
</style>

    <style>
        /* Related Posts Carousel */
        .related-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 2px solid var(--gold);
        }
        .related-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .related-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--gold);
        }
        .carousel-nav {
            display: flex;
            gap: 12px;
        }
        .carousel-btn {
            background: rgba(198,164,59,0.15);
            border: 1px solid rgba(198,164,59,0.3);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: var(--gold);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carousel-btn:hover {
            background: rgba(198,164,59,0.3);
            transform: scale(1.05);
        }
        .carousel-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .carousel-container {
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .carousel-container::-webkit-scrollbar {
            height: 6px;
        }
        .carousel-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .carousel-container::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
        .carousel-track {
            display: flex;
            gap: 20px;
            padding: 8px 4px 20px 4px;
        }
        .related-card {
            flex: 0 0 220px;
            text-decoration: none;
            background: rgba(255,255,255,.03);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(198,164,59,.2);
        }
        .related-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .related-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }
        .related-card .card-content {
            padding: 12px;
        }
        .related-card .card-tag {
            font-size: 0.65rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .related-card .card-title {
            font-size: 0.85rem;
            margin-top: 6px;
            color: var(--text);
            line-height: 1.4;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .related-card .card-summary {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        /* Mobile: chuyển sang trượt dọc */
        @media (max-width: 768px) {
            .related-section {
                margin-top: 40px;
                padding-top: 30px;
            }
            .related-header h3 {
                font-size: 1.4rem;
            }
            .carousel-nav {
                display: none;
            }
            .carousel-container {
                overflow-x: visible;
                overflow-y: visible;
            }
            .carousel-track {
                flex-direction: column;
                gap: 16px;
                padding: 0;
            }
            .related-card {
                flex: 1 1 auto;
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 12px;
                padding: 8px;
            }
            .related-card img {
                width: 90px;
                height: 70px;
                flex-shrink: 0;
                border-radius: 12px;
            }
            .related-card .card-content {
                padding: 0;
                flex: 1;
            }
            .related-card .card-summary {
                display: none;
            }
        }
        @media (max-width: 480px) {
            .related-card img {
                width: 80px;
                height: 65px;
            }
            .related-card .card-title {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<nav><h1><img src="../logo.webp" alt="Logo" style="height:32px;width:32px;object-fit:cover;border-radius:7px;vertical-align:middle;margin-right:7px;" onerror="this.style.display='none'"> Nhà<span>Đẹp</span></h1><a href="../index.html">← Về trang chủ</a></nav>
<div class="container">
  <div class="meta"><a class="tag" href="../../tag.html?tag=Hi%E1%BB%87n%20%C4%91%E1%BA%A1i">Hiện đại</a><span class="date">6/4/2026</span></div>
  <div class="content"></div>
  
    <div class="related-section">
        <div class="related-header">
            <h3><i class="fa-regular fa-star" style="margin-right:12px;"></i>Có thể bạn sẽ thích</h3>
            <div class="carousel-nav">
                <button class="carousel-btn" id="carouselPrevBtn" aria-label="Previous"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="carousel-btn" id="carouselNextBtn" aria-label="Next"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="carousel-container" id="carouselContainer">
            <div class="carousel-track" id="carouselTrack">
                <div style="text-align: center; padding: 40px; color: var(--muted); width: 100%;"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải...</div>
            </div>
        </div>
    </div>
    <script>
        let allRelatedArticles = [];
        let currentScrollIndex = 0;
        let cardWidth = 240; // 220px card + 20px gap
        
        function updateCarouselButtons() {
            const container = document.getElementById('carouselContainer');
            const prevBtn = document.getElementById('carouselPrevBtn');
            const nextBtn = document.getElementById('carouselNextBtn');
            if (!container || window.innerWidth <= 768) return;
            const maxScroll = container.scrollWidth - container.clientWidth;
            const currentScroll = container.scrollLeft;
            if (prevBtn) prevBtn.disabled = currentScroll <= 5;
            if (nextBtn) nextBtn.disabled = currentScroll >= maxScroll - 5;
        }
        
        function scrollCarousel(direction) {
            const container = document.getElementById('carouselContainer');
            if (!container) return;
            const scrollAmount = cardWidth * 2;
            container.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
            setTimeout(updateCarouselButtons, 350);
        }
        
        function getDataJsonPath() {
            var currentPath = window.location.pathname;
            var pathParts = currentPath.split('/').filter(function(p) { return p && !p.includes('.html'); });
            var depth = pathParts.length;
            var prefix = '';
            for (var i = 0; i < depth; i++) { prefix += '../'; }
            if (prefix === '') prefix = './';
            return prefix + 'data.json';
        }
        
        async function loadRelatedPosts() {
            try {
                var currentSlug = 'test2';
                var currentType = 'nhadep';
                var dataJsonPath = getDataJsonPath();
                var response = await fetch(dataJsonPath + '?t=' + Date.now());
                if (!response.ok) throw new Error('Cannot load data.json');
                var articles = await response.json();
                var postedArticles = articles.filter(function(a) {
                    var status = (a.Status || a.status || '').toLowerCase();
                    return status === 'posted';
                });
                var filtered = postedArticles.filter(function(a) {
                    if (!a.relatedlink) return false;
                    var relatedSlug = a.relatedlink.replace('./', '').replace('.html', '');
                    try { relatedSlug = decodeURIComponent(relatedSlug); } catch(e) {}
                    var articleKind = a.kind || '';
                    if (relatedSlug === currentSlug && articleKind === currentType) return false;
                    return true;
                });
                // Random shuffle
                for (var i = filtered.length - 1; i > 0; i--) {
                    var j = Math.floor(Math.random() * (i + 1));
                    var temp = filtered[i];
                    filtered[i] = filtered[j];
                    filtered[j] = temp;
                }
                allRelatedArticles = filtered;
                renderCarousel();
                setupCarouselEvents();
            } catch(e) { console.error(e); }
        }
        
        function renderCarousel() {
            var track = document.getElementById('carouselTrack');
            if (!track) return;
            if (allRelatedArticles.length === 0) {
                track.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--muted); width: 100%;">Chưa có bài viết liên quan</div>';
                return;
            }
            var currentDepth = window.location.pathname.split('/').filter(function(p) { return p && !p.includes('.html'); }).length;
            var backPath = '';
            for (var d = 0; d < currentDepth; d++) { backPath += '../'; }
            if (backPath === '') backPath = './';
            var html = '';
            for (var k = 0; k < allRelatedArticles.length; k++) {
                var article = allRelatedArticles[k];
                var articleTitle = false ? (article.title_en || '') : (article.title || '');
                var articleSummary = false ? (article.summary_en || '') : (article.summary || '');
                var articleKind = article.kind || 'nhadep';
                var articleRelLink = article.relatedlink || '';
                var articleSlug = articleRelLink.replace('./', '').replace('.html', '');
                try { articleSlug = decodeURIComponent(articleSlug); } catch(e) {}
                var articleUrl = backPath + articleKind + '/' + encodeURIComponent(articleSlug) + (false ? '_en.html' : '.html');
                var articleTag = article.tag || 'Bài viết';
                if (articleTag && articleTag.includes(',')) articleTag = articleTag.split(',')[0].trim();
                var thumbnailPath = backPath + 'thumbnail/' + articleKind + '/' + encodeURIComponent(articleSlug) + '.webp';
                var shortSummary = (articleSummary || '').substring(0, 80);
                html += '<a href="' + articleUrl + '" class="related-card">' +
                    '<img src="' + thumbnailPath + '" alt="' + escapeHtmlStatic(articleTitle) + '" loading="lazy" onerror="this.style.display='none'">' +
                    '<div class="card-content">' +
                    '<span class="card-tag">' + escapeHtmlStatic(articleTag) + '</span>' +
                    '<h4 class="card-title">' + escapeHtmlStatic(articleTitle) + '</h4>' +
                    (shortSummary ? '<p class="card-summary">' + escapeHtmlStatic(shortSummary) + (shortSummary.length >= 80 ? '...' : '') + '</p>' : '') +
                    '</div></a>';
            }
            track.innerHTML = html;
        }
        
        function setupCarouselEvents() {
            const container = document.getElementById('carouselContainer');
            const prevBtn = document.getElementById('carouselPrevBtn');
            const nextBtn = document.getElementById('carouselNextBtn');
            if (!container) return;
            function updateCardWidth() {
                const firstCard = document.querySelector('.related-card');
                if (firstCard && window.innerWidth > 768) {
                    const rect = firstCard.getBoundingClientRect();
                    const gap = 20;
                    cardWidth = rect.width + gap;
                }
            }
            updateCardWidth();
            window.addEventListener('resize', function() {
                updateCardWidth();
                if (window.innerWidth <= 768) {
                    if (prevBtn) prevBtn.disabled = false;
                    if (nextBtn) nextBtn.disabled = false;
                } else {
                    updateCarouselButtons();
                }
            });
            if (prevBtn) prevBtn.addEventListener('click', function() { scrollCarousel(-1); });
            if (nextBtn) nextBtn.addEventListener('click', function() { scrollCarousel(1); });
            if (container && window.innerWidth > 768) {
                container.addEventListener('scroll', updateCarouselButtons);
                setTimeout(updateCarouselButtons, 100);
            }
        }
        
        function escapeHtmlStatic(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
        
        document.addEventListener('DOMContentLoaded', loadRelatedPosts);
    </script>
  <div style="text-align:center;"><a href="../index.html" class="back-btn">← Quay lại trang chủ</a></div>
</div>

    <style>
        .lang-switch-bottom {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 1px;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 3px;
            border: 1px solid rgba(198,164,59,0.3);
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .lang-switch-bottom .lang-btn-bottom {
            background: none;
            border: none;
            color: #9C9C9C;
            cursor: pointer;
            font-size: 0.82rem;
            padding: 8px 15px;
            border-radius: 50px;
            transition: all 0.2s;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            white-space: nowrap;
            min-width: 68px;
        }
        .lang-switch-bottom .lang-btn-bottom:hover {
            background: rgba(198,164,59,0.18);
            color: #C6A43B;
        }
        .lang-switch-bottom .lang-btn-bottom.active {
            background: rgba(198,164,59,0.28);
            color: #C6A43B;
        }
        @media (max-width: 768px) {
            .lang-switch-bottom { bottom: 16px; right: 16px; padding: 3px; gap: 0px; }
            .lang-switch-bottom .lang-btn-bottom { padding: 7px 13px; font-size: 0.73rem; min-width: 64px; }
        }
    </style>
    <div class="lang-switch-bottom">
        <button class="lang-btn-bottom" id="langViBottom">🇻🇳 VI</button>
        <button class="lang-btn-bottom" id="langEnBottom">🇬🇧 EN</button>
    </div>
    <script>
    function setupLanguageSwitch() {
        var viBtn = document.getElementById('langViBottom');
        var enBtn = document.getElementById('langEnBottom');
        var currentPath = window.location.pathname;
        function switchToVi() { if (currentPath.includes('_en.html')) { window.location.href = window.location.href.replace('_en.html', '.html'); } }
        function switchToEn() { if (!currentPath.includes('_en.html')) { window.location.href = window.location.href.replace('.html', '_en.html'); } }
        viBtn.onclick = function(e) { e.preventDefault(); switchToVi(); };
        enBtn.onclick = function(e) { e.preventDefault(); switchToEn(); };
        if (currentPath.includes('_en.html')) {
            enBtn.style.background = 'rgba(198,164,59,0.25)';
            enBtn.style.color = '#C6A43B';
        } else {
            viBtn.style.background = 'rgba(198,164,59,0.25)';
            viBtn.style.color = '#C6A43B';
        }
    }
    document.addEventListener('DOMContentLoaded', setupLanguageSwitch);
    </script>
</body>
