<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag — BeautifulHome</title>
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --bg: #0A0A0A;
            --card: #111111;
            --mid: #1A1A1A;
            --border: rgba(198,164,59,.2);
            --gold: #C6A43B;
            --gold2: #D4AF37;
            --text: #F5F5F5;
            --muted: #9C9C9C;
            --dim: #6B6B6B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        nav {
            background: rgba(10,10,10,.95);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        nav h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
        nav h1 span { color: var(--gold); }
        nav a { color: var(--muted); text-decoration: none; font-size: .9rem; transition: color .2s; }
        nav a:hover { color: var(--gold); }

        .hero {
            padding: 56px 32px 36px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .hero-eyebrow {
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 12px;
        }
        .hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 900;
            line-height: 1.2;
        }
        .hero h2 .tag-name { color: var(--gold); }
        .hero-count {
            margin-top: 12px;
            color: var(--muted);
            font-size: .88rem;
        }
        .hero-divider {
            margin-top: 32px;
            border: none;
            border-top: 1px solid var(--border);
        }

        .all-tags-bar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 32px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .all-tags-bar .bar-label {
            font-size: .75rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 4px;
        }
        .tag-pill {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: .75rem;
            text-decoration: none;
            background: var(--mid);
            color: var(--muted);
            border: 1px solid var(--border);
            transition: all .2s;
            cursor: pointer;
        }
        .tag-pill:hover { background: rgba(198,164,59,.15); color: var(--gold); border-color: var(--gold); }
        .tag-pill.active { background: rgba(198,164,59,.25); color: var(--gold2); border-color: var(--gold); font-weight: 600; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 32px 80px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }

        /* CARD - không cần thẻ a, dùng div và xử lý click bằng JS */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: transform .25s, border-color .25s, box-shadow .25s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(198,164,59,.5);
            box-shadow: 0 12px 40px rgba(0,0,0,.5);
        }
        
        .card-thumb-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: linear-gradient(135deg, var(--mid), #222);
        }
        .card-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .5s ease;
        }
        .card:hover .card-thumb {
            transform: scale(1.05);
        }
        
        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, 
                rgba(0,0,0,0.95) 0%,
                rgba(0,0,0,0.85) 20%,
                rgba(0,0,0,0.5) 60%,
                transparent 100%);
            padding: 20px 20px 18px;
            transition: all .3s ease;
            pointer-events: none;
        }
        
        .card-body {
            display: flex;
            flex-direction: column;
        }
        
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
            pointer-events: auto;
        }
        .card-tag {
            font-size: .65rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(198,164,59,.2);
            color: var(--gold2);
            text-decoration: none;
            transition: all .2s;
            font-weight: 500;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
            display: inline-block;
            pointer-events: auto;
            position: relative;
            z-index: 10;
        }
        .card-tag:hover { background: rgba(198,164,59,.4); color: #fff; }
        .card-tag.active-tag {
            background: rgba(198,164,59,.5);
            color: #fff;
            font-weight: 600;
        }
        
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 8px;
            color: var(--text);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-summary {
            font-size: .8rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
        }
        
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .card-date { 
            font-size: .7rem; 
            color: rgba(255,255,255,0.6);
        }
        .card-arrow {
            font-size: .75rem;
            color: var(--gold);
            transition: transform .2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .card:hover .card-arrow i {
            transform: translateX(4px);
            transition: transform .2s;
        }
        .card-arrow i { 
            transition: transform .2s;
            font-size: .7rem;
        }

        .card:hover .card-overlay {
            background: linear-gradient(to top, 
                rgba(0,0,0,0.98) 0%,
                rgba(0,0,0,0.88) 20%,
                rgba(0,0,0,0.55) 60%,
                rgba(0,0,0,0.1) 100%);
        }
        
        .card:hover .card-title {
            color: var(--gold2);
        }

        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }
        .empty i { font-size: 3rem; color: var(--dim); margin-bottom: 20px; display: block; }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--dim);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            nav { padding: 12px 16px; }
            .hero { padding: 36px 16px 24px; }
            .hero h2 { font-size: 1.7rem; }
            .all-tags-bar { padding: 16px 16px 0; }
            .container { padding: 24px 16px 60px; }
            .grid { 
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .card-overlay {
                padding: 16px 16px 14px;
            }
            .card-title {
                font-size: 1rem;
                -webkit-line-clamp: 2;
            }
            .card-summary {
                font-size: .75rem;
                -webkit-line-clamp: 2;
            }
            .card-tags {
                gap: 5px;
                margin-bottom: 6px;
            }
            .card-tag {
                font-size: .6rem;
                padding: 2px 8px;
            }
        }
    </style>
</head>
<body>

<nav>
    <h1>
        <img src="./logo.webp" alt="Logo"
             style="height:32px;width:32px;object-fit:cover;border-radius:7px;vertical-align:middle;margin-right:7px;"
             onerror="this.style.display='none'">
        Beautiful<span>Home</span>
    </h1>
    <a href="./index.html">← Back to Home</a>
</nav>

<div class="hero">
    <div class="hero-eyebrow"><i class="fa-solid fa-tag"></i> Category</div>
    <h2>Articles about <span class="tag-name" id="hero-tag-name">…</span></h2>
    <div class="hero-count" id="hero-count"></div>
    <hr class="hero-divider">
</div>

<div class="all-tags-bar" id="all-tags-bar">
    <span class="bar-label">All Tags:</span>
</div>

<div class="container">
    <div class="grid" id="grid">
        <div class="loading"><div class="spinner"></div>Loading articles…</div>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const activeTag = (params.get('tag') || '').trim();

document.title = activeTag ? `Tag: ${activeTag} — NhàĐẹp.vn` : 'Tags — BeautifulHome';
document.getElementById('hero-tag-name').textContent = activeTag || 'All';

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function buildArticleUrl(item) {
    return item.url || '#';
}

function buildThumbUrl(item) {
    const kind = item.kind || 'nhadep';
    const relLink = (item.relatedlink || '').replace('./', '').replace('.html', '');
    let slug = relLink;
    try { slug = decodeURIComponent(relLink); } catch(e) {}
    return `./thumbnail/${kind}/${encodeURIComponent(slug)}.webp`;
}

function getTags(item) {
    return (item.tag || '').split(',').map(t => t.trim()).filter(Boolean);
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;
        return date.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
    } catch(e) {
        return dateStr;
    }
}

// Render card KHÔNG có thẻ a, dùng div và data-url để xử lý click
function renderCard(item) {
    if (!item || !item.title || !item.url || item.title.trim() === '') {
        return '';
    }
    
    const url = buildArticleUrl(item);
    if (url === '#' || url === '') {
        return '';
    }
    
    const thumbUrl = buildThumbUrl(item);
    const tags = getTags(item);
    const title = escapeHtml(item.title.trim());
    const summary = escapeHtml((item.summary || '').substring(0, 100));
    const date = formatDate(item.date || '');
    const displaySummary = summary + (item.summary && item.summary.length > 100 ? '…' : '');

    const tagsHtml = tags.map(t => {
        const isActive = t === activeTag ? ' active-tag' : '';
        return `<a class="card-tag" href="./tag.html?tag=${encodeURIComponent(t)}" onclick="event.stopPropagation()">${escapeHtml(t)}</a>`;
    }).join('');

    // KHÔNG còn thẻ a.card, thay vào đó là div.card với data-url
    return '<div class="card" data-url="' + escapeHtml(url) + '">' +
        '<div class="card-thumb-wrap">' +
            '<img class="card-thumb" src="' + escapeHtml(thumbUrl) + '" alt="' + title + '" loading="lazy" onerror="this.style.opacity=\'0.6\'">' +
            '<div class="card-overlay">' +
                '<div class="card-body">' +
                    (tagsHtml ? '<div class="card-tags">' + tagsHtml + '</div>' : '') +
                    '<div class="card-title">' + title + '</div>' +
                    (displaySummary ? '<div class="card-summary">' + displaySummary + '</div>' : '') +
                    '<div class="card-footer">' +
                        (date ? '<span class="card-date"><i class="fa-regular fa-calendar-alt" style="margin-right: 4px;"></i>' + date + '</span>' : '<span></span>') +
                        '<span class="card-arrow">Read more <i class="fa-solid fa-arrow-right"></i></span>' +
                    '</div>' +
                '</div>' +
            '</div>' +
        '</div>' +
    '</div>';
}

function renderTagsBar(allPosts) {
    const tagSet = new Set();
    allPosts.forEach(p => {
        if (p && p.title && p.url && p.title.trim() !== '') {
            getTags(p).forEach(t => tagSet.add(t));
        }
    });

    const bar = document.getElementById('all-tags-bar');
    if (tagSet.size === 0) {
        bar.innerHTML = `<span class="bar-label"><i class="fa-solid fa-tags"></i> No tags yet</span>`;
        return;
    }
    
    const pills = [...tagSet].sort().map(t => {
        const isActive = t === activeTag ? ' active' : '';
        return `<a class="tag-pill${isActive}" href="./tag.html?tag=${encodeURIComponent(t)}">${escapeHtml(t)}</a>`;
    }).join('');
    
    bar.innerHTML = `<span class="bar-label"><i class="fa-solid fa-tags"></i> Tags:</span>${pills}`;
}

// Xử lý click trên card (điều hướng đến URL)
function attachCardClickHandlers() {
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        card.removeEventListener('click', handleCardClick);
        card.addEventListener('click', handleCardClick);
    });
}

function handleCardClick(event) {
    // Không xử lý nếu click vào tag (tag đã có link riêng)
    if (event.target.closest('.card-tag')) {
        return;
    }
    
    const card = event.currentTarget;
    const url = card.getAttribute('data-url');
    if (url && url !== '#') {
        window.location.href = url;
    }
}

(async function () {
    const grid = document.getElementById('grid');
    try {
        const res = await fetch('./data.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const posts = await res.json();
        
        // Lọc articles hợp lệ
        const validPosts = posts.filter(p => {
            return p && 
                   p.title && 
                   p.url && 
                   p.title.trim() !== '' &&
                   p.url !== '#' &&
                   p.url !== '';
        });
        
        if (validPosts.length === 0) {
            grid.innerHTML = `<div class="empty"><i class="fa-regular fa-folder-open"></i><div>Không có articles nào</div></div>`;
            return;
        }

        renderTagsBar(validPosts);

        // Lọc theo tag
        const filtered = activeTag
            ? validPosts.filter(p =>
                getTags(p).some(t => t.toLowerCase() === activeTag.toLowerCase())
              )
            : validPosts;

        const countText = filtered.length > 0
            ? `${filtered.length} articles`
            : 'Chưa có articles nào';
        document.getElementById('hero-count').innerHTML = `<i class="fa-regular fa-newspaper"></i> ${countText}`;

        if (filtered.length === 0) {
            grid.innerHTML = `
                <div class="empty">
                    <i class="fa-regular fa-folder-open"></i>
                    <div>Không tìm thấy articles nào với tag <strong>"${escapeHtml(activeTag)}"</strong></div>
                    <div style="margin-top: 16px; font-size: 0.85rem;">
                        <a href="./tag.html" style="color: var(--gold); text-decoration: none;">← Xem tất cả articles</a>
                    </div>
                </div>`;
        } else {
            // Render tất cả card
            let cardsHtml = '';
            for (let i = 0; i < filtered.length; i++) {
                const cardHtml = renderCard(filtered[i]);
                if (cardHtml && cardHtml.trim() !== '') {
                    cardsHtml += cardHtml;
                }
            }
            
            if (!cardsHtml || cardsHtml.trim() === '') {
                grid.innerHTML = `<div class="empty"><i class="fa-regular fa-folder-open"></i><div>Không có articles nào để hiển thị</div></div>`;
            } else {
                grid.innerHTML = cardsHtml;
                // Gắn sự kiện click sau khi render
                attachCardClickHandlers();
            }
        }

    } catch (err) {
        grid.innerHTML = `
            <div class="empty">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <div>Unable to load data.<br><small style="color:var(--dim)">${escapeHtml(err.message)}</small></div>
            </div>`;
        console.error('tag.html error:', err);
    }
})();
</script>
<!-- Nút chuyển đổi ngôn ngữ góc phải dưới -->
<style>
    .lang-switch-bottom {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        gap: 0px;
        background: rgba(10,10,10,0.9);
        backdrop-filter: blur(20px);
        border-radius: 40px;
        padding: 4px;
        border: 1px solid rgba(198,164,59,0.3);
        z-index: 10000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .lang-switch-bottom .lang-btn-bottom {
        background: none;
        border: none;
        color: #9C9C9C;
        cursor: pointer;
        font-size: 0.8rem;
        padding: 8px 18px;
        border-radius: 30px;
        transition: all 0.2s;
        font-weight: 600;
        font-family: 'Open Sans', sans-serif;
        margin: 0;
    }
    
    .lang-switch-bottom .lang-btn-bottom:hover {
        background: rgba(198,164,59,0.15);
        color: #C6A43B;
    }
    
    @media (max-width: 768px) {
        .lang-switch-bottom {
            bottom: 16px;
            right: 16px;
            padding: 3px;
        }
        .lang-switch-bottom .lang-btn-bottom {
            padding: 5px 12px;
            font-size: 0.7rem;
        }
    }
</style>

<div class="lang-switch-bottom">
    <button class="lang-btn-bottom" id="langViBottom">🇻🇳 VI</button>
    <button class="lang-btn-bottom" id="langEnBottom">🇬🇧 EN</button>
</div>

<script>
(function() {
    const viBtn = document.getElementById('langViBottom');
    const enBtn = document.getElementById('langEnBottom');
    
    const isEnPage = window.location.pathname.includes('entrans.html');
    
    // Nút VI
    viBtn.onclick = function(e) {
        e.preventDefault();
        if (isEnPage) {
            // Đang ở EN, quay về VI
            const pendingUrl = localStorage.getItem('pendingTranslateUrl');
            window.location.href = pendingUrl || './index.html';
        }
        // Nếu đang ở VI, không làm gì
    };
    
    // Nút EN
    enBtn.onclick = function(e) {
        e.preventDefault();
        if (!isEnPage) {
            // Đang ở VI, chuyển sang EN
            const currentUrl = window.location.href;
            localStorage.setItem('pendingTranslateUrl', currentUrl);
            window.location.href = './entrans.html';
        }
        // Nếu đang ở EN, không làm gì
    };
})();
</script>
</body>
</html>
